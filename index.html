        const portraitClass = p.visualMode === "carousel-portrait" ? " portrait" : "";
        const containClass  = p.visualMode === "carousel-portrait" ? " contain" : "";
        return `
          <div class="project-media" data-carousel>
            <div class="project-visual${portraitClass}">
              <div class="carousel">
                <div class="carousel-track">
                  ${media.map((src, i) => `
                    <div class="carousel-slide${i === 0 ? " active" : ""}${containClass}">
                      <img src="${esc(src)}" alt="${esc(p.title)} slide ${i + 1}">
                    </div>`).join("")}
                </div>
              </div>
            </div>
            ${media.length > 1 ? `
            <div class="carousel-controls">
              <button class="carousel-btn" data-prev aria-label="Previous">${ICONS.chevronLeft}</button>
              <div class="carousel-dots"></div>
              <button class="carousel-btn" data-next aria-label="Next">${ICONS.chevronRight}</button>

          : "";

        const mediaSection = isWalkthrough

          : `<div class="proj-page-media">${buildMediaHtml(p)}</div>`;

        wrap.innerHTML = `
          <a href="#projects" class="proj-back">

          </a>

          ${mediaSection}

          ${stats.length ? `
          <div class="proj-stats">
            ${stats.map(s => `
              <div class="proj-stat">

                  </div>

      function initThemeToggle() {
        const btn = document.getElementById("themeToggle");
        if (!btn) return;
        const KEY = "mz-theme";
        const current = () =>
          document.documentElement.getAttribute("data-theme") === "light"
            ? "light"
            : "dark";
        const apply = (theme) => {
          if (theme === "light")
            document.documentElement.setAttribute("data-theme", "light");
          else document.documentElement.removeAttribute("data-theme");
          // Show the icon for the mode you'll switch TO:
          // dark active → sun (tap for light); light active → moon (tap for dark)
          btn.innerHTML = theme === "light" ? ICONS.moon : ICONS.sun;
          btn.setAttribute(
            "aria-label",
            theme === "light" ? "Switch to dark mode" : "Switch to light mode",
          );
          try {
            localStorage.setItem(KEY, theme);
          } catch (e) {}
        };
        apply(current()); // sync icon with the state set by the no-flash <head> script
        btn.addEventListener("click", () =>
          apply(current() === "light" ? "dark" : "light"),
        );
      }

      // ── render everything on the main page (called on load + language switch) ──
      function renderAll(d) {
        renderMeta(d);
        renderNav(d);
        renderHero(d);
        renderAbout(d);
        renderExperience(d);
        renderProjects(d);
        renderServices(d);
        renderVolunteering(d);
        renderSkills(d);
        renderContact(d);
        renderFooter(d);
      }

      function initLangToggle() {
        const btn = document.getElementById("langToggle");
        if (!btn) return;
        // Show the language you'll switch TO: "ع" while in English, "EN" while in Arabic
        btn.textContent = LANG === "ar" ? "EN" : "ع";
        const title =
          LANG === "ar" ? "Switch to English" : "التبديل إلى العربية";
        btn.setAttribute("title", title);
        btn.setAttribute("aria-label", title);
        btn.addEventListener("click", () =>
          setLanguage(LANG === "ar" ? "en" : "ar"),
        );
      }

      function setLanguage(lang) {
        LANG = lang === "ar" ? "ar" : "en";
        try {
          localStorage.setItem("mz-lang", LANG);
        } catch (e) {}
        // Language + direction apply site-wide (main page AND project pages)
        document.documentElement.setAttribute("lang", LANG);
        document.documentElement.setAttribute(
          "dir",
          LANG === "ar" ? "rtl" : "ltr",
        );
        const d = currentData();
        if (!d) return;
        renderAll(d);
        bindDynamic(false);
        // If a project page is open, re-render it in the new language too
        if (document.getElementById("projectPage").style.display === "block") {
          const y = window.scrollY;
          router();
          window.scrollTo({ top: y, behavior: "instant" });
        }
      }

      // ── bindings that must re-run whenever the nav / sections re-render ──
      function bindDynamic(animateReveals) {
        initThemeToggle();
        initLangToggle();

        // mobile hamburger (elements are recreated by renderNav)
        const navToggle = document.getElementById("navToggle");
        const navLinks = document.getElementById("navLinks");
        if (navToggle && navLinks) {
          navToggle.addEventListener("click", () =>
            navLinks.classList.toggle("open"),
          );
          navLinks
            .querySelectorAll("a")
            .forEach((a) =>
              a.addEventListener("click", () =>
                navLinks.classList.remove("open"),
              ),
            );
        }

        // reveal on scroll — animated on first load, instant after a language switch
        if (animateReveals) {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting) {
                  entry.target.classList.add("in");
                  observer.unobserve(entry.target);
                }
              });
            },
            { threshold: 0.12, rootMargin: "0px 0px -60px 0px" },
          );
          document
            .querySelectorAll(".reveal, .reveal-stagger")
            .forEach((el) => observer.observe(el));
        } else {
          document
            .querySelectorAll(".reveal, .reveal-stagger")
            .forEach((el) => el.classList.add("in"));
        }

        // carousels on the main portfolio view
        initCarousels(document);
      }

      function initInteractions() {
        // ── one-time listeners (survive language re-renders) ──
        const topbar = document.getElementById("topbar");
        const onScroll = () => {
          if (window.scrollY > 30) topbar.classList.add("scrolled");
          else topbar.classList.remove("scrolled");
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();

        // active nav highlight — anchors queried live so re-rendered navs keep working
        const sectionIds = [
          "home",
          "about",
          "experience",
          "projects",
          "volunteering",
          "skills",
          "services",
          "contact",
        ];
        const sections = sectionIds.map((id) => document.getElementById(id));
        const setActive = () => {
          const y = window.scrollY + 120;
          let current = "home";
          sections.forEach((sec) => {
            if (sec && sec.offsetTop <= y) current = sec.id;
          });
          document
            .querySelectorAll(".nav-links a, .mobile-nav-item")
            .forEach((a) =>
              a.classList.toggle("active", a.dataset.section === current),
            );
        };
        window.addEventListener("scroll", setActive, { passive: true });
        setActive();

        // ── dynamic bindings (also re-run on language switch) ──
        bindDynamic(true);
      }
    </script>

    <!-- ============ BOOTSTRAP ============ -->
    <script>
      (async function () {
        try {
          const data = await loadData();
          _dataEN = data; // English base — Arabic overrides merge on top
          _portfolioData = data; // router lookups — project pages always English
          renderAll(currentData());
          initInteractions();
          window.addEventListener("hashchange", router);
          router(); // check hash on initial load (handles direct links to project pages)
          setTimeout(
            () =>
              document.getElementById("loadingOverlay").classList.add("hidden"),
            200,
          );
        } catch (err) {
          console.error("Bootstrap failed:", err);
          // overlay already shows the error message in loadData
        }
      })();
    </script>
  </body>
</html>
