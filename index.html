<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moamen Soliman — Portfolio</title>
    <meta name="description" content="Personal portfolio." />
    <link rel="icon" type="image/png" href="assets/logo.png" id="favicon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Cairo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --navy-950: #04071a;
        --navy-900: #080d24;
        --navy-800: #0d1432;
        --navy-700: #141d44;
        --navy-600: #1c2858;
        --navy-500: #27356f;
        --line: rgba(125, 148, 220, 0.15);
        --line-strong: rgba(125, 148, 220, 0.28);
        --cyan: #00d4ff;
        --cyan-soft: rgba(0, 212, 255, 0.18);
        --blue: #4d8fff;
        --blue-soft: rgba(77, 143, 255, 0.18);
        --violet: #8b5cf6;
        --violet-soft: rgba(139, 92, 246, 0.18);
        --magenta: #d946ef;
        --magenta-soft: rgba(217, 70, 239, 0.16);
        --green: #2ee6a8;
        --green-soft: rgba(46, 230, 168, 0.14);
        /* RGB triplets for rgba(var(--x-rgb), a) patterns (theme-aware badges) */
        --blue-rgb: 77, 143, 255;
        --violet-rgb: 139, 92, 246;
        --magenta-rgb: 217, 70, 239;
        --green-rgb: 46, 230, 168;
        /* Categorical series scale (cyan → blue → violet → magenta) —
           mirrors the aurora; used as a color-scale legend motif site-wide */
        --scale: linear-gradient(90deg, var(--cyan), var(--blue), var(--violet), var(--magenta));
        --text: #eef2ff;
        --text-2: #aab3d4;
        --text-3: #6b7596;
        --maxw: 1240px;
        --radius: 18px;
        --radius-sm: 12px;
        --display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
        --body: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, monospace;
        --surf: 255, 255, 255;
        --glass: 8, 13, 36;
      }

      /* ============ LIGHT MODE (toggled via [data-theme="light"] on <html>) ============ */
      [data-theme="light"] {
        --navy-950: #eaeef7;   /* page background */
        --navy-900: #ffffff;   /* nav / top surfaces */
        --navy-800: #f3f6fc;   /* window frames */
        --navy-700: #e6ebf5;
        --navy-600: #d8e0ef;
        --navy-500: #b9c5e0;
        --line: rgba(23, 37, 84, 0.13);
        --line-strong: rgba(23, 37, 84, 0.20);
        --text: #0e1733;
        --text-2: #45506e;
        --text-3: #6c7796;
        --cyan: #00d4ff;        /* brand accent — unchanged */
        --blue: #4d8fff;        /* brand accent — unchanged */
        --violet: #7c3aed;      /* deeper for contrast on light */
        --violet-soft: rgba(124, 58, 237, 0.14);
        --magenta: #a21caf;     /* deeper for contrast on light */
        --magenta-soft: rgba(162, 28, 175, 0.12);
        --blue-soft: rgba(77, 143, 255, 0.15);
        --green: #047857;       /* deeper for contrast on light */
        --green-soft: rgba(4, 120, 87, 0.12);
        --blue-rgb: 77, 143, 255;
        --violet-rgb: 124, 58, 237;
        --magenta-rgb: 162, 28, 175;
        --green-rgb: 4, 120, 87;
        --surf: 23, 37, 84;     /* surface tint flips white → dark navy */
        --glass: 255, 255, 255; /* nav glass flips dark → white */
        color-scheme: light;
      }

      /* Elevated white cards (proper elevation on the light background) */
      [data-theme="light"] .tl-card,
      [data-theme="light"] .proj-stat,
      [data-theme="light"] .proj-tool,
      [data-theme="light"] .proc-step,
      [data-theme="light"] .skill-card,
      [data-theme="light"] .vol-card,
      [data-theme="light"] .wt-step,
      [data-theme="light"] .report-kpi,
      [data-theme="light"] .report-insight,
      [data-theme="light"] .rec-card,
      [data-theme="light"] .float-card,
      [data-theme="light"] .svc-card,
      [data-theme="light"] .rc-bars {
        background: #ffffff;
        box-shadow: 0 2px 16px -8px rgba(23, 37, 84, 0.16);
      }
      [data-theme="light"] .contact-card {
        background: #ffffff;
        box-shadow: 0 6px 34px -14px rgba(23, 37, 84, 0.2);
      }
      [data-theme="light"] .project-visual {
        box-shadow: 0 24px 56px -28px rgba(23, 37, 84, 0.32), 0 0 0 1px rgba(0, 212, 255, 0.06);
      }
      /* Image/carousel backings flip to a light surface so letterboxing isn't dark */
      [data-theme="light"] .carousel-slide,
      [data-theme="light"] .project-visual.single img,
      [data-theme="light"] .project-visual.single video {
        background: #e6ebf5;
      }

      /* Bright cyan/blue gradient buttons & badges keep DARK text in light mode
         (the gradient stays bright, so the label must not flip to a light colour) */
      [data-theme="light"] .nav-cta,
      [data-theme="light"] .btn-primary,
      [data-theme="light"] .btn-view-project,
      [data-theme="light"] .proj-action-primary,
      [data-theme="light"] .proj-action-primary:hover,
      [data-theme="light"] .mobile-nav-item.active,
      [data-theme="light"] .mobile-nav-item.active:hover,
      [data-theme="light"] .skill-card .icon-fallback,
      [data-theme="light"] .socials a:hover {
        color: #04071a;
      }
      /* Series 3–4 (violet/magenta) gradients are deep in light mode —
         their fallback glyphs stay white for contrast */
      [data-theme="light"] .skill-cat:nth-child(3) .icon-fallback,
      [data-theme="light"] .skill-cat:nth-child(4) .icon-fallback {
        color: #ffffff;
      }

      /* Cyan-tinted highlight cards keep a soft tint instead of plain white */
      [data-theme="light"] .wt-intro,
      [data-theme="light"] .wt-outro,
      [data-theme="light"] .svc-cta,
      [data-theme="light"] .report-bottomline,
      [data-theme="light"] .rc-conclusion {
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(255, 255, 255, 0.7));
      }
      [data-theme="light"] .rc-banner {
        background: linear-gradient(135deg, rgba(255, 107, 107, 0.12), rgba(255, 107, 107, 0.04));
      }

      /* Code blocks stay dark in light mode (terminal aesthetic) — keep their text light */
      [data-theme="light"] .wt-code,
      [data-theme="light"] .sql-preview-body code { color: #c8d3ea; }
      [data-theme="light"] .wt-code-label,
      [data-theme="light"] .sql-preview-label { color: #8493b0; }
      [data-theme="light"] .wt-code-copy { color: #aab3d4; border-color: rgba(255, 255, 255, 0.16); }
      [data-theme="light"] .wt-code-copy:hover { color: var(--cyan); border-color: var(--cyan); }

      /* Soft shadows for the floating/scrolled nav surfaces in light mode */
      [data-theme="light"] nav.topbar.scrolled { box-shadow: 0 4px 24px -12px rgba(23, 37, 84, 0.2); }
      [data-theme="light"] .mobile-nav { box-shadow: 0 18px 50px -16px rgba(23, 37, 84, 0.28); }

      /* ============ FREELANCE SERVICES SECTION ============ */
      .svc-availability {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green);
        background: rgba(var(--green-rgb), 0.08);
        border: 1px solid rgba(var(--green-rgb), 0.28);
        padding: 0.45rem 0.95rem;
        border-radius: 99px;
        margin-bottom: 1.2rem;
      }
      .svc-pulse {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        animation: svcPulse 2s infinite;
      }
      @keyframes svcPulse {
        0% { box-shadow: 0 0 0 0 rgba(var(--green-rgb), 0.45); }
        70% { box-shadow: 0 0 0 9px rgba(var(--green-rgb), 0); }
        100% { box-shadow: 0 0 0 0 rgba(var(--green-rgb), 0); }
      }
      .svc-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.1rem;
        margin-top: 2.6rem;
      }
      /* Each service is a "series": 1 cyan · 2 blue · 3 violet · 4 magenta */
      .svc-card { --svc: var(--cyan); }
      .svc-card:nth-child(2) { --svc: var(--blue); }
      .svc-card:nth-child(3) { --svc: var(--violet); }
      .svc-card:nth-child(4) { --svc: var(--magenta); }
      .svc-card {
        padding: 1.7rem 1.7rem 1.6rem;
        background: linear-gradient(160deg, rgba(var(--surf), 0.04), rgba(var(--surf), 0.01));
        border: 1px solid var(--line);
        border-radius: 18px;
        transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      }
      .svc-card:hover {
        transform: translateY(-4px);
        border-color: color-mix(in srgb, var(--svc) 40%, transparent);
        box-shadow: 0 18px 44px -20px color-mix(in srgb, var(--svc) 28%, transparent);
      }
      .svc-icon {
        width: 48px;
        height: 48px;
        border-radius: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--svc) 15%, transparent),
          color-mix(in srgb, var(--svc) 7%, transparent)
        );
        border: 1px solid color-mix(in srgb, var(--svc) 32%, transparent);
        color: var(--svc);
        margin-bottom: 1.1rem;
      }
      .svc-icon svg { width: 23px; height: 23px; }
      .svc-title {
        font-size: 1.08rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.55rem;
      }
      .svc-desc {
        font-size: 0.9rem;
        color: var(--text-2);
        line-height: 1.7;
        margin-bottom: 1rem;
      }
      .svc-tags { display: flex; flex-wrap: wrap; gap: 0.45rem; }
      .svc-tags span {
        font-family: var(--mono);
        font-size: 0.68rem;
        color: var(--text-3);
        padding: 0.3rem 0.65rem;
        border: 1px solid var(--line);
        border-radius: 99px;
        background: rgba(var(--surf), 0.03);
      }
      .svc-cta {
        margin-top: 2.4rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1.4rem;
        flex-wrap: wrap;
        padding: 1.6rem 2rem;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.08), rgba(77, 143, 255, 0.04));
        border: 1px solid rgba(0, 212, 255, 0.25);
      }
      .svc-cta-text {
        font-family: var(--display);
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text);
      }
      @media (max-width: 980px) {
        .svc-grid { gap: 0.9rem; }
      }
      @media (max-width: 680px) {
        .svc-grid { grid-template-columns: 1fr; }
        .svc-cta { flex-direction: column; align-items: flex-start; padding: 1.4rem; }
      }

      /* ============ ARABIC (RTL) SUPPORT — main page only ============ */
      html[lang="ar"] {
        --display: "Cairo", "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
        --body: "Cairo", "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
      }
      /* Wide letter-spacing is designed for uppercase Latin — disable it for Arabic */
      html[lang="ar"] * { letter-spacing: normal !important; }

      /* Timeline rail + dots mirror to the right */
      [dir="rtl"] .timeline { padding-left: 0; padding-right: 2.4rem; }
      [dir="rtl"] .timeline::before { left: auto; right: 7px; }
      [dir="rtl"] .tl-item::before { left: auto; right: -2.4rem; }
      @media (max-width: 680px) {
        [dir="rtl"] .timeline { padding-right: 1.6rem; }
        [dir="rtl"] .tl-item::before { right: -1.6rem; }
      }

      /* Latin/mono fragments render LTR inside the RTL flow */
      [dir="rtl"] .project-num { direction: ltr; text-align: right; }

      /* Directional arrows mirror in RTL */
      [dir="rtl"] .proj-card-link svg,
      [dir="rtl"] .btn-ghost svg,
      [dir="rtl"] .nav-cta svg { transform: scaleX(-1); }

      /* Keep carousel prev/next arrows in their physical positions */
      [dir="rtl"] .carousel-controls { direction: ltr; }

      /* Mobile hero stays start-aligned in Arabic */
      @media (max-width: 980px) {
        [dir="rtl"] .hero-grid { text-align: right; }
      }

      /* ── RTL support for PROJECT DETAIL pages ── */
      [dir="rtl"] .proj-stat { text-align: right; }
      [dir="rtl"] .proj-back svg { transform: scaleX(-1); }
      [dir="rtl"] .proc-step::after {
        right: auto;
        left: -0.55rem;
        transform: translateY(-50%) scaleX(-1);
      }
      [dir="rtl"] .wt-flow-arrow { transform: scaleX(-1); }
      /* Code blocks always read left-to-right, even inside Arabic pages */
      [dir="rtl"] .wt-code-block { direction: ltr; }
      [dir="rtl"] .proj-page-desc code,
      [dir="rtl"] .wt-step-desc code,
      [dir="rtl"] .ri-text code {
        direction: ltr;
        unicode-bidi: embed;
      }
      /* Insight card accent bar mirrors to the right edge */
      [dir="rtl"] .report-insight {
        border-left: 1px solid var(--line);
        border-right: 3px solid var(--ri);
      }

      /* ── Arabic typography fixes (Cairo is taller than the Latin faces) ── */
      html[lang="ar"] h1,
      html[lang="ar"] h2,
      html[lang="ar"] h3,
      html[lang="ar"] h4 {
        line-height: 1.4;
      }
      html[lang="ar"] .hero h1 {
        line-height: 1.22;
      }
      html[lang="ar"] .hero h1 .last-name {
        font-style: normal; /* synthetic italics distort Arabic script */
        padding-right: 0;
      }
      html[lang="ar"] .section-title,
      html[lang="ar"] .contact-card h2,
      html[lang="ar"] .proj-page-title {
        line-height: 1.35;
      }
      /* Section eyebrow: bigger + Cairo instead of tiny fallback-mono Arabic */
      html[lang="ar"] .eyebrow {
        font-family: var(--body);
        font-weight: 700;
        font-size: 0.98rem;
      }

      /* ── Nav density: 8 links must never squeeze the brand name ── */
      @media (max-width: 1300px) {
        ul.nav-links { gap: 0.15rem; }
        ul.nav-links a { padding: 0.5rem 0.7rem; font-size: 0.88rem; }
      }

      /* ── Light mode: browser-chrome bar above project media goes light ── */
      [data-theme="light"] .project-visual::before {
        background: linear-gradient(
          180deg,
          rgba(213, 222, 240, 0.95),
          rgba(213, 222, 240, 0)
        );
      }

      /* ── "View Details" — the single, prominent card action ── */
      .btn-details {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.75rem 1.35rem;
        background: rgba(0, 212, 255, 0.07);
        color: var(--cyan);
        border: 1px solid rgba(0, 212, 255, 0.45);
        border-radius: 99px;
        font-weight: 600;
        font-size: 0.88rem;
        text-decoration: none;
        transition: all 0.25s;
      }
      .btn-details svg { width: 15px; height: 15px; }
      .btn-details:hover {
        background: var(--cyan);
        border-color: var(--cyan);
        color: #04071a;
        transform: translateY(-2px);
        box-shadow: 0 10px 30px -10px rgba(0, 212, 255, 0.5);
      }
      [dir="rtl"] .btn-details svg { transform: scaleX(-1); }

      /* ============ MOBILE FLOATING NAV — sizing for 8 icons ============ */
      @media (max-width: 480px) {
        nav.mobile-nav { gap: 0.15rem; padding: 0.4rem; }
        .mobile-nav .mobile-nav-item { width: 38px; height: 38px; }
      }
      @media (max-width: 374px) {
        .mobile-nav .mobile-nav-item { width: 34px; height: 34px; }
        .mobile-nav .mobile-nav-item svg { width: 18px; height: 18px; }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--body);
        background: var(--navy-950);
        color: var(--text);
        line-height: 1.6;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom Scrollbar for Firefox */
      html {
        scrollbar-width: thin;
        scrollbar-color: var(--navy-500) var(--navy-950);
      }

      /* Custom Scrollbar for Chrome, Edge, and Safari */
      ::-webkit-scrollbar {
        width: 12px;
      }

      ::-webkit-scrollbar-track {
        background: var(--navy-950);
        border-left: 1px solid var(--line);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--navy-600);
        border-radius: 10px;
        /* The border acts as a transparent padding to make the scrollbar look sleeker */
        border: 3px solid var(--navy-950);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--cyan);
      }

      /* ============ ANIMATED BACKGROUND — northern-lights ribbons ============
         The graph-paper grid is gone: the aurora IS the background now.
         Five blurred light curtains + one ambient sky wash sway on the
         compositor (transform/opacity only — zero repaint cost). One shared
         keyframe set drives every ribbon; each ribbon feeds it geometry via
         custom props. Tuning cheat-sheet: --aur-* alphas = intensity,
         per-ribbon --sway / --tilt / --lean = motion range, --dur = speed. */
      :root {
        --aur-cyan: rgba(0, 212, 255, 0.6);
        --aur-blue: rgba(77, 143, 255, 0.55);
        --aur-violet: rgba(139, 92, 246, 0.55);
        --aur-magenta: rgba(217, 70, 239, 0.5);
        --aur-wash: rgba(0, 212, 255, 0.14);
      }
      [data-theme="light"] {
        --aur-cyan: rgba(0, 186, 232, 0.32);
        --aur-blue: rgba(77, 143, 255, 0.28);
        --aur-violet: rgba(139, 92, 246, 0.26);
        --aur-magenta: rgba(217, 70, 239, 0.22);
        --aur-wash: rgba(0, 186, 232, 0.1);
      }
      .bg-aurora {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }
      /* Ambient sky glow behind the curtains — gives the ribbons a stage. */
      .aurora-wash {
        position: absolute;
        left: -25vw;
        top: -35vh;
        width: 150vw;
        height: 95vh;
        background: radial-gradient(
          ellipse at 50% 40%,
          var(--aur-wash),
          transparent 70%
        );
        will-change: transform, opacity;
        animation: washBreathe 18s ease-in-out infinite alternate;
      }
      /* One curtain of light. Geometry + palette come from the per-ribbon
         custom props below; the shared ribbonSway keyframes read them with
         var(), so a single keyframe set animates all five curtains. */
      .aurora-ribbon {
        position: absolute;
        top: -18vh;
        height: 136vh;
        width: clamp(130px, var(--w), 430px);
        left: var(--x);
        background: linear-gradient(
          180deg,
          transparent 0%,
          var(--c1) 24%,
          var(--c2) 48%,
          var(--c1) 66%,
          transparent 92%
        );
        border-radius: 999px;
        filter: blur(clamp(30px, 4.5vw, 64px));
        mix-blend-mode: screen;
        transform-origin: 50% 10%;
        will-change: transform, opacity;
        animation: ribbonSway var(--dur) ease-in-out infinite alternate;
        animation-delay: var(--del);
      }
      /* Light mode: screen-blending vanishes on white; multiply reads like
         watercolor light — same curtains, softer voice. */
      [data-theme="light"] .aurora-ribbon {
        mix-blend-mode: multiply;
      }
      .aurora-ribbon.r1 {
        --x: 3%;
        --w: 17vw;
        --c1: var(--aur-cyan);
        --c2: var(--aur-blue);
        --tilt: 11deg;
        --lean: 7deg;
        --sway: clamp(26px, 5vw, 92px);
        --dim: 0.55;
        --dur: 12s;
        --del: 0s;
      }
      .aurora-ribbon.r2 {
        --x: 21%;
        --w: 12vw;
        --c1: var(--aur-blue);
        --c2: var(--aur-violet);
        --tilt: 8deg;
        --lean: 9deg;
        --sway: clamp(34px, 6.5vw, 120px);
        --dim: 0.6;
        --dur: 15s;
        --del: -6s;
      }
      .aurora-ribbon.r3 {
        --x: 40%;
        --w: 19vw;
        --c1: var(--aur-violet);
        --c2: var(--aur-magenta);
        --tilt: 13deg;
        --lean: 6deg;
        --sway: clamp(24px, 4.5vw, 84px);
        --dim: 0.5;
        --dur: 17.5s;
        --del: -11s;
      }
      .aurora-ribbon.r4 {
        --x: 62%;
        --w: 11vw;
        --c1: var(--aur-cyan);
        --c2: var(--aur-violet);
        --tilt: 7deg;
        --lean: 10deg;
        --sway: clamp(36px, 7vw, 128px);
        --dim: 0.62;
        --dur: 13.5s;
        --del: -3s;
      }
      .aurora-ribbon.r5 {
        --x: 80%;
        --w: 15vw;
        --c1: var(--aur-magenta);
        --c2: var(--aur-blue);
        --tilt: 12deg;
        --lean: 8deg;
        --sway: clamp(28px, 5.5vw, 100px);
        --dim: 0.55;
        --dur: 16s;
        --del: -9s;
      }
      /* The curtain sway: pinned near the top (transform-origin 50% 10%),
         so skewX swings the tail like hanging fabric while the whole ribbon
         drifts sideways and stretches. Alternate + desynced delays keep the
         five curtains permanently out of phase. */
      @keyframes ribbonSway {
        0% {
          transform: translate3d(calc(var(--sway) * -1), -1vh, 0)
            rotate(var(--tilt)) skewX(calc(var(--lean) * -1)) scaleY(1.03);
          opacity: var(--dim);
        }
        50% {
          transform: translate3d(0, 1.4vh, 0)
            rotate(calc(var(--tilt) + 2.5deg)) skewX(var(--lean)) scaleY(1.16);

        100% {

            rotate(calc(var(--tilt) - 1.5deg))

      /* Note: the aurora intentionally ignores prefers-reduced-motion for now.

      .vol-hero-overlay {

        text-transform: uppercase;
