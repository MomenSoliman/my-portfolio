<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moamen Soliman — Portfolio</title>
    <meta name="description" content="Personal portfolio." />
    <link rel="icon" type="image/png" href="assets/logo.png" id="favicon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --navy-950: #04071a;
        --navy-900: #080d24;
        --navy-800: #0d1432;
        --navy-700: #141d44;
        --navy-600: #1c2858;
        --navy-500: #27356f;
        --line: rgba(125, 148, 220, 0.15);
        --line-strong: rgba(125, 148, 220, 0.28);
        --cyan: #00d4ff;
        --cyan-soft: rgba(0, 212, 255, 0.18);
        --blue: #4d8fff;
        --blue-deep: #2d6cdf;
        --gold: #ffc14d;
        --text: #eef2ff;
        --text-2: #aab3d4;
        --text-3: #6b7596;
        --maxw: 1240px;
        --radius: 18px;
        --radius-sm: 12px;
        --display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
        --body: "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, monospace;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--body);
        background: var(--navy-950);
        color: var(--text);
        line-height: 1.6;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom Scrollbar for Firefox */
      html {
        scrollbar-width: thin;
        scrollbar-color: var(--navy-500) var(--navy-950);
      }

      /* Custom Scrollbar for Chrome, Edge, and Safari */
      ::-webkit-scrollbar {
        width: 12px;
      }

      ::-webkit-scrollbar-track {
        background: var(--navy-950);
        border-left: 1px solid var(--line);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--navy-600);
        border-radius: 10px;
        /* The border acts as a transparent padding to make the scrollbar look sleeker */
        border: 3px solid var(--navy-950);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--cyan);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 60px 60px;
        background-position: center;
        mask-image: radial-gradient(
          ellipse at center,
          #000 30%,
          transparent 75%
        );
        -webkit-mask-image: radial-gradient(
          ellipse at center,
          #000 30%,
          transparent 75%
        );
        pointer-events: none;
        z-index: 0;
        opacity: 0.45;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            60vw 60vh at 80% -10%,
            rgba(0, 212, 255, 0.08),
            transparent 60%
          ),
          radial-gradient(
            50vw 50vh at -10% 40%,
            rgba(77, 143, 255, 0.07),
            transparent 60%
          ),
          radial-gradient(
            40vw 40vh at 50% 110%,
            rgba(45, 108, 223, 0.08),
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }
      main,
      nav,
      footer {
        position: relative;
        z-index: 1;
      }

      h1,
      h2,
      h3,
      h4,
      h5 {
        font-family: var(--display);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.05;
      }
      .eyebrow {
        font-family: var(--mono);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: var(--cyan);
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
      }
      .eyebrow::before {
        content: "";
        width: 32px;
        height: 1px;
        background: var(--cyan);
      }
      .eyebrow.center {
        display: flex;
        justify-content: center;
      }
      .eyebrow.center::after {
        content: "";
        width: 32px;
        height: 1px;
        background: var(--cyan);
      }
      .section-title {
        font-size: clamp(2.4rem, 5vw, 4.2rem);
        font-weight: 700;
        margin-bottom: 1rem;
        letter-spacing: -0.03em;
      }
      h2 .accent,
      h3 .accent,
      .section-title .accent {
        background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-style: italic;
        font-weight: 600;
        padding-right: 0.12em;
        margin-right: -0.04em;
      }
      .section-sub {
        color: var(--text-2);
        max-width: 60ch;
        margin-bottom: 3.5rem;
        font-size: 1.05rem;
      }

      nav.topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        padding: 1rem 0;
        transition:
          background 0.3s,
          backdrop-filter 0.3s,
          padding 0.3s,
          border-color 0.3s;
        border-bottom: 1px solid transparent;
      }
      nav.topbar.scrolled {
        background: rgba(8, 13, 36, 0.78);
        backdrop-filter: blur(18px) saturate(140%);
        -webkit-backdrop-filter: blur(18px) saturate(140%);
        padding: 0.7rem 0;
        border-bottom-color: var(--line);
      }
      .nav-inner {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 2rem;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
        color: var(--text);
      }
      .brand-logo {
        width: 38px;
        height: 38px;
        display: inline-block;
        flex-shrink: 0;
        background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.35));
        transition: transform 0.35s ease;
      }
      .brand:hover .brand-logo {
        transform: rotate(-6deg) scale(1.05);
      }
      .brand .brand-name {
        font-family: var(--display);
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 0.02em;
      }
      .brand .brand-name span {
        color: var(--cyan);
      }
      .nav-links {
        display: flex;
        gap: 0.5rem;
        list-style: none;
      }
      .nav-links a {
        color: var(--text-2);
        text-decoration: none;
        font-size: 0.92rem;
        font-weight: 500;
        padding: 0.55rem 1rem;
        border-radius: 99px;
        transition: all 0.25s;
        position: relative;
      }
      .nav-links a:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }
      .nav-links a.active {
        color: var(--cyan);
      }
      .nav-cta {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.1rem;
        background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
        color: var(--navy-950);
        border-radius: 99px;
        font-weight: 600;
        font-size: 0.88rem;
        text-decoration: none;
        transition:
          transform 0.2s,
          box-shadow 0.25s;
        box-shadow: 0 6px 24px -8px rgba(0, 212, 255, 0.5);
      }
      .nav-cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 32px -8px rgba(0, 212, 255, 0.65);
      }
      .nav-toggle {
        display: none;
        background: none;
        border: 0;
        color: var(--text);
        cursor: pointer;
        padding: 0.5rem;
      }

      .hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 8rem 2rem 5rem;
        position: relative;
      }
      .hero-grid {
        max-width: var(--maxw);
        margin: 0 auto;
        width: 100%;
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 4rem;
        align-items: center;
      }
      .hero-text > * {
        opacity: 0;
        transform: translateY(24px);
        animation: rise 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      .hero-text > *:nth-child(1) {
        animation-delay: 0.05s;
      }
      .hero-text > *:nth-child(2) {
        animation-delay: 0.18s;
      }
      .hero-text > *:nth-child(3) {
        animation-delay: 0.32s;
      }
      .hero-text > *:nth-child(4) {
        animation-delay: 0.46s;
      }
      .hero-text > *:nth-child(5) {
        animation-delay: 0.6s;
      }
      @keyframes rise {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .greet {
        font-family: var(--mono);
        color: var(--cyan);
        font-size: 0.95rem;
        margin-bottom: 1.2rem;
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
      }
      .greet .dot {
        width: 8px;
        height: 8px;
        border-radius: 99px;
        background: var(--cyan);
        box-shadow: 0 0 0 0 var(--cyan-soft);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.5);
        }
        70% {
          box-shadow: 0 0 0 14px rgba(0, 212, 255, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 212, 255, 0);
        }
      }
      .hero h1 {
        font-size: clamp(3rem, 8vw, 6.4rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 0.95;
        margin-bottom: 1.4rem;
      }
      .hero h1 .first-name {
        display: block;
      }
      .hero h1 .last-name {
        display: block;
        background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-style: italic;
        font-weight: 700;
        padding-right: 0.08em;
      }
      .titles {
        font-size: 1.05rem;
        color: var(--text-2);
        margin-bottom: 2rem;
        max-width: 54ch;
        line-height: 1.65;
      }
      .titles strong {
        color: var(--text);
        font-weight: 600;
      }
      .titles .pipe {
        color: var(--cyan);
        margin: 0 0.35rem;
        font-weight: 500;
      }
      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-items: center;
        margin-bottom: 2.4rem;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.95rem 1.7rem;
        background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
        color: var(--navy-950);
        border-radius: 99px;
        font-weight: 700;
        font-size: 0.95rem;
        text-decoration: none;
        transition:
          transform 0.2s,
          box-shadow 0.25s;
        box-shadow: 0 8px 28px -10px rgba(0, 212, 255, 0.5);
        border: 0;
        cursor: pointer;
      }
      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 36px -10px rgba(0, 212, 255, 0.7);
      }
      .btn-primary svg {
        width: 18px;
        height: 18px;
      }
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.95rem 1.5rem;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        border: 1px solid var(--line-strong);
        border-radius: 99px;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        transition: all 0.2s;
        cursor: pointer;
      }
      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: var(--cyan);
      }
      .socials {
        display: flex;
        gap: 0.7rem;
      }
      .socials a {
        width: 46px;
        height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        border: 1px solid var(--line-strong);
        color: var(--text-2);
        background: rgba(255, 255, 255, 0.02);
        transition: all 0.25s;
      }
      .socials a:hover {
        color: var(--navy-950);
        background: var(--cyan);
        border-color: var(--cyan);
        transform: translateY(-3px);
        box-shadow: 0 8px 22px -8px var(--cyan);
      }
      .socials svg {
        width: 20px;
        height: 20px;
      }
      .hero-photo {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        animation: rise 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.35s forwards;
      }
      .photo-frame {
        position: relative;
        width: min(100%, 440px);
        aspect-ratio: 3/4;
      }
      .photo-frame::before {
        content: "";
        position: absolute;
        inset: -20px;
        background: radial-gradient(
          closest-side,
          rgba(0, 212, 255, 0.4),
          rgba(77, 143, 255, 0.18) 50%,
          transparent 75%
        );
        filter: blur(40px);
        z-index: 0;
        animation: float 8s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-14px) scale(1.04);
        }
      }
      .photo-frame .photo-bg {
        position: absolute;
        inset: 0;
        border-radius: 24px;
        background: linear-gradient(
          135deg,
          var(--navy-700) 0%,
          var(--navy-800) 50%,
          var(--navy-900) 100%
        );
        border: 1px solid var(--line-strong);
        overflow: hidden;
        z-index: 1;
      }
      .photo-frame .photo-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(transparent 0%, rgba(8, 13, 36, 0.65) 100%),
          repeating-linear-gradient(
            90deg,
            transparent 0,
            transparent 28px,
            rgba(0, 212, 255, 0.03) 28px,
            rgba(0, 212, 255, 0.03) 29px
          );
        z-index: 2;
        pointer-events: none;
      }
      .photo-frame img {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        height: 108%;
        width: auto;
        z-index: 2;
        filter: drop-shadow(0 24px 60px rgba(0, 0, 0, 0.6));
      }
      .float-card {
        position: absolute;
        background: rgba(13, 20, 50, 0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        padding: 0.85rem 1.1rem;
        z-index: 3;
        font-family: var(--mono);
        font-size: 0.78rem;
        color: var(--text-2);
        display: flex;
        align-items: center;
        gap: 0.65rem;
        box-shadow: 0 14px 40px -12px rgba(0, 0, 0, 0.6);
        animation: float 6s ease-in-out infinite;
      }
      .float-card .num {
        color: var(--cyan);
        font-weight: 600;
        font-size: 1.05rem;
      }
      .float-card .label {
        font-size: 0.7rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .scroll-cue {
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.25em;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
        opacity: 0;
        animation: rise 1s ease 1.6s forwards;
      }
      .scroll-cue .line {
        width: 1px;
        height: 36px;
        background: linear-gradient(transparent, var(--cyan));
        animation: scrollPulse 2s ease-in-out infinite;
      }
      @keyframes scrollPulse {
        0%,
        100% {
          transform: scaleY(0.4);
          transform-origin: top;
        }
        50% {
          transform: scaleY(1);
        }
      }

      section {
        padding: 7rem 2rem;
        position: relative;
      }
      .container {
        max-width: var(--maxw);
        margin: 0 auto;
      }
      .reveal {
        opacity: 0;
        transform: translateY(40px);
        transition:
          opacity 0.9s cubic-bezier(0.2, 0.8, 0.2, 1),
          transform 0.9s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .reveal.in {
        opacity: 1;
        transform: translateY(0);
      }
      .reveal-stagger > * {
        opacity: 0;
        transform: translateY(28px);
        transition:
          opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1),
          transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .reveal-stagger.in > * {
        opacity: 1;
        transform: translateY(0);
      }
      .reveal-stagger.in > *:nth-child(1) {
        transition-delay: 0.05s;
      }
      .reveal-stagger.in > *:nth-child(2) {
        transition-delay: 0.15s;
      }
      .reveal-stagger.in > *:nth-child(3) {
        transition-delay: 0.25s;
      }
      .reveal-stagger.in > *:nth-child(4) {
        transition-delay: 0.35s;
      }
      .reveal-stagger.in > *:nth-child(5) {
        transition-delay: 0.45s;
      }
      .reveal-stagger.in > *:nth-child(6) {
        transition-delay: 0.55s;
      }
      .reveal-stagger.in > *:nth-child(7) {
        transition-delay: 0.65s;
      }
      .reveal-stagger.in > *:nth-child(8) {
        transition-delay: 0.75s;
      }

      .about-grid {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 5rem;
        align-items: start;
      }
      .about-text p {
        color: var(--text-2);
        font-size: 1.08rem;
        margin-bottom: 1.2rem;
        line-height: 1.75;
      }
      .about-text p:last-child {
        margin-bottom: 0;
      }
      .about-text strong {
        color: var(--text);
      }
      .about-text .hl {
        color: var(--cyan);
        font-weight: 500;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
      .stat-card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0)
        );
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 1.6rem 1.4rem;
        position: relative;
        overflow: hidden;
      }
      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--cyan),
          transparent
        );
        opacity: 0.6;
      }
      .stat-card .num {
        font-family: var(--display);
        font-size: 2.4rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1;
        margin-bottom: 0.4rem;
        letter-spacing: -0.03em;
      }
      .stat-card .num span {
        color: var(--cyan);
      }
      .stat-card .label {
        font-size: 0.78rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-family: var(--mono);
      }

      .timeline {
        position: relative;
        padding-left: 2.4rem;
      }
      .timeline::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 8px;
        bottom: 8px;
        width: 2px;
        background: linear-gradient(
          180deg,
          var(--cyan),
          var(--blue) 40%,
          transparent
        );
      }
      .tl-item {
        position: relative;
        padding-bottom: 3rem;
      }
      .tl-item:last-child {
        padding-bottom: 0;
      }
      .tl-item::before {
        content: "";
        position: absolute;
        left: -2.4rem;
        top: 6px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--navy-950);
        border: 2px solid var(--cyan);
        box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.12);
      }
      .tl-card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0)
        );
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 1.8rem 2rem;
        transition:
          border-color 0.3s,
          transform 0.3s;
      }
      .tl-card:hover {
        border-color: var(--cyan);
        transform: translateX(6px);
      }
      .tl-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 1.2rem;
        margin-bottom: 0.4rem;
        font-family: var(--mono);
        font-size: 0.78rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.12em;

    <!-- ============ DATA LAYER ============ -->
    <script>
      const STORAGE_KEY = "moamen_portfolio_overrides_v1";

      async function loadData() {
        // Fetch base data.json
        let base = {};
        try {
          const res = await fetch("data.json?t=" + Date.now());
          if (!res.ok) throw new Error("data.json not found");
          base = await res.json();
        } catch (err) {
          console.error("Could not load data.json:", err);
          document.getElementById("loadingOverlay").innerHTML =
            '<div style="text-align:center;padding:2rem;max-width:480px"><h2 style="color:var(--cyan);margin-bottom:1rem">data.json missing</h2><p style="color:var(--text-2)">Make sure data.json sits next to index.html. If you opened index.html via file:// some browsers block local fetch — use a local server (e.g. <code style="font-family:var(--mono);color:var(--cyan)">python3 -m http.server</code>) or deploy.</p></div>';
          throw err;
        }
        // Merge with localStorage overrides if present
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const overrides = JSON.parse(raw);
            // overrides REPLACES base entirely (full snapshot model — admin saves full state)
            return overrides;
          }
        } catch (e) {
          console.warn("Failed to read localStorage overrides", e);
        }
        return base;
      }
    </script>

    <!-- ============ RENDER LAYER ============ -->
    <script>
      function esc(s) {
        return String(s ?? "").replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }
      function processInline(html) {
        if (!html) return "";
        return html
          .replace(/<accent>(.*?)<\/accent>/g, '<span class="accent">$1</span>')
          .replace(/<hl>(.*?)<\/hl>/g, '<span class="hl">$1</span>');
      }

      function renderMeta(d) {
        document.title = d.siteTitle || "Portfolio";
        const md = document.querySelector('meta[name="description"]');
        if (md) md.setAttribute("content", d.siteDescription || "");
        if (d.profile?.logo) {
          document
            .getElementById("favicon")
            .setAttribute("href", d.profile.logo);
        }
      }

      function renderNav(d) {
        const inner = document.getElementById("navInner");
        const profile = d.profile || {};

          { id: "home", label: "Home" },

        inner.innerHTML = `

    <a href="${esc(profile.resumeUrl || "#")}" target="_blank" rel="noopener" class="nav-cta">Resume ${ICONS.arrowOut}</a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">${ICONS.menu}</button>
  `;
        // apply mask-image for logo
        if (profile.logo) {
          const lg = document.getElementById("brandLogo");
          lg.style.webkitMaskImage = `url('${profile.logo}')`;
          lg.style.maskImage = `url('${profile.logo}')`;
        }
      }

              const pos = c.position || {};

              if (pos.left !== undefined)
                styleParts.push(`left:${esc(String(pos.left))}`);

  `;

          <span style="flex:1;height:1px;background:linear-gradient(90deg,var(--line-strong),transparent)"></span>
        </h3>
        <div class="certs-list">
          ${certs
            .map(
              (c) => `
            <div class="cert-row">
              ${ICONS.award}
              <div><strong>${esc(c.type || "")}</strong> — ${esc(c.title || "")}</div>
            </div>
          `,
            )
            .join("")}
        </div>
      </div>`
          : ""
      }
    </div>
  `;
      }

      function renderSkillCard(item) {
        let iconHtml = "";
        if (item.iconType === "svg" && item.iconValue) {
          iconHtml = `<div class="icon-wrap">${item.iconValue}</div>`;
        } else if (item.iconType === "url" && item.iconValue) {
          iconHtml = `<div class="icon-wrap"><img src="${esc(item.iconValue)}" alt="${esc(item.name || "")}"></div>`;
        } else {
          iconHtml = `<div class="icon-fallback">${esc(item.iconValue || (item.name || "?").slice(0, 2))}</div>`;
        }
        return `<div class="skill-card">${iconHtml}<div class="skill-name">${esc(item.name || "")}</div></div>`;
      }

      function renderContact(d) {
        const el = document.getElementById("contact");
        const c = d.contact || {};
        const social = (d.profile && d.profile.social) || {};
        const email = (d.profile && d.profile.email) || "";
        el.innerHTML = `
    <div class="contact-card reveal">
      <span class="eyebrow center">${esc(c.eyebrow || "Contact")}</span>
      <h2>${processInline(c.headlineHtml || "")}</h2>
      ${c.description ? `<p>${esc(c.description)}</p>` : ""}
      <div class="contact-actions">
        ${email ? `<a href="mailto:${esc(email)}" class="btn-primary">${ICONS.email} Get in touch</a>` : ""}
        ${social.linkedin ? `<a href="${esc(social.linkedin)}" target="_blank" rel="noopener" class="btn-ghost">Connect on LinkedIn</a>` : ""}
      </div>
    </div>
  `;
      }

      function renderFooter(d) {
        const el = document.getElementById("footer");
        const social = (d.profile && d.profile.social) || {};
        const email = (d.profile && d.profile.email) || "";
        const tagline = (d.footer && d.footer.tagline) || "";
        const fullName =
          ((d.profile && d.profile.firstName) || "") +
          " " +
          ((d.profile && d.profile.lastName) || "");
        el.innerHTML = `
    <div class="footer-inner">
      <div class="copy">© <span id="year"></span> ${esc(fullName.trim())} · ${esc(tagline)}</div>
      <div class="socials">
        ${social.github ? `<a href="${esc(social.github)}" target="_blank" rel="noopener" aria-label="GitHub">${ICONS.github}</a>` : ""}
        ${social.linkedin ? `<a href="${esc(social.linkedin)}" target="_blank" rel="noopener" aria-label="LinkedIn">${ICONS.linkedin}</a>` : ""}
        ${social.facebook ? `<a href="${esc(social.facebook)}" target="_blank" rel="noopener" aria-label="Facebook">${ICONS.facebook}</a>` : ""}
        ${email ? `<a href="mailto:${esc(email)}" aria-label="Email">${ICONS.email}</a>` : ""}
      </div>
    </div>
  `;
        document.getElementById("year").textContent = new Date().getFullYear();
      }
    </script>

    <!-- ============ INTERACTION LAYER ============ -->
    <script>
      function initInteractions() {
        // nav scroll state
        const topbar = document.getElementById("topbar");
        const onScroll = () => {
          if (window.scrollY > 30) topbar.classList.add("scrolled");
          else topbar.classList.remove("scrolled");
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();

        // mobile nav toggle
        const navToggle = document.getElementById("navToggle");
        const navLinks = document.getElementById("navLinks");
        if (navToggle && navLinks) {
          navToggle.addEventListener("click", () =>
            navLinks.classList.toggle("open"),
          );
          navLinks
            .querySelectorAll("a")
            .forEach((a) =>
              a.addEventListener("click", () =>
                navLinks.classList.remove("open"),
              ),
            );
        }

        // active nav highlight
        const sectionIds = [
          "home",
          "about",
          "experience",
          "projects",
          "volunteering",
          "skills",
          "contact",
        ];
        const sections = sectionIds.map((id) => document.getElementById(id));
        const navAnchors = document.querySelectorAll(".nav-links a");
        const setActive = () => {
          const y = window.scrollY + 120;
          let current = "home";
          sections.forEach((sec) => {
            if (sec && sec.offsetTop <= y) current = sec.id;
          });
          navAnchors.forEach((a) =>
            a.classList.toggle("active", a.dataset.section === current),
          );
        };
        window.addEventListener("scroll", setActive, { passive: true });
        setActive();

        // reveal on scroll
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("in");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.12, rootMargin: "0px 0px -60px 0px" },
        );
        document
          .querySelectorAll(".reveal, .reveal-stagger")
          .forEach((el) => observer.observe(el));

        // carousels
        document.querySelectorAll("[data-carousel]").forEach((carousel) => {
          const slides = carousel.querySelectorAll(".carousel-slide");
          const dotsWrap = carousel.querySelector(".carousel-dots");
          const prev = carousel.querySelector("[data-prev]");
          const next = carousel.querySelector("[data-next]");
          if (!slides.length || !dotsWrap || !prev || !next) return;
          let idx = 0;
          let timer = null;
          slides.forEach((_, i) => {
            const b = document.createElement("button");
            b.className = "dot-btn" + (i === 0 ? " active" : "");
            b.addEventListener("click", () => go(i, true));
            dotsWrap.appendChild(b);
          });
          const dots = dotsWrap.querySelectorAll(".dot-btn");
          const go = (i, manual) => {
            idx = (i + slides.length) % slides.length;
            slides.forEach((s, k) => s.classList.toggle("active", k === idx));
            dots.forEach((d, k) => d.classList.toggle("active", k === idx));
            if (manual) restart();
          };
          prev.addEventListener("click", () => go(idx - 1, true));
          next.addEventListener("click", () => go(idx + 1, true));
          const start = () => {
            timer = setInterval(() => go(idx + 1), 5500);
          };
          const restart = () => {
            clearInterval(timer);
            start();
          };
          carousel.addEventListener("mouseenter", () => clearInterval(timer));
          carousel.addEventListener("mouseleave", start);
          const visObs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) start();
                else clearInterval(timer);
              });
            },
            { threshold: 0.3 },
          );
          visObs.observe(carousel);
        });
      }
    </script>

    <!-- ============ BOOTSTRAP ============ -->
    <script>
      (async function () {
        try {
          const data = await loadData();
          renderMeta(data);
          renderNav(data);
          renderHero(data);
          renderAbout(data);
          renderExperience(data);
          renderProjects(data);
          renderVolunteering(data);
          renderSkills(data);
          renderContact(data);
          renderFooter(data);
          initInteractions();
          setTimeout(
            () =>
              document.getElementById("loadingOverlay").classList.add("hidden"),
            200,
          );
        } catch (err) {
          console.error("Bootstrap failed:", err);
          // overlay already shows the error message in loadData
        }
      })();
    </script>
  </body>
</html>
