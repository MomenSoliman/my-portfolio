        color: var(--cyan);
        margin-bottom: 1rem;
        padding: 0.4rem 0.85rem;
        background: rgba(0, 212, 255, 0.14);
        border: 1px solid rgba(0, 212, 255, 0.32);
        border-radius: 99px;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .vol-hero-meta h3 {
        font-size: clamp(1.55rem, 3vw, 2.3rem);
        margin-bottom: 0.45rem;
        letter-spacing: -0.02em;
        line-height: 1.1;
        color: #fff;
      }
      .vol-org {
        font-size: 1.02rem;
        color: rgba(255, 255, 255, 0.86);
        margin-bottom: 0.7rem;
        font-weight: 500;
      }
      .vol-org .badge-now {
        display: inline-block;
        margin-left: 0.55rem;
        padding: 0.18rem 0.6rem;
        background: rgba(0, 212, 255, 0.22);
        color: var(--cyan);
        border-radius: 99px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        font-family: var(--mono);
        vertical-align: middle;
        border: 1px solid rgba(0, 212, 255, 0.35);
      }
      .vol-meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem 0.7rem;
        font-family: var(--mono);
        font-size: 0.74rem;
        color: rgba(255, 255, 255, 0.62);
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }
      .vol-meta-row .dot-sep {
        color: var(--cyan);
      }
      .vol-hero .carousel-controls {
        position: absolute;
        top: 1.55rem;
        right: 1.4rem;
        z-index: 4;
        background: rgba(8, 13, 36, 0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(var(--surf), 0.16);
      }
      .vol-body {
        padding: 2rem 2.4rem 2.2rem;
      }
      .vol-bullets {
        list-style: none;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
      }
      .vol-bullets li {
        position: relative;
        padding-left: 1.4rem;
        color: var(--text-2);
        font-size: 0.96rem;
        line-height: 1.65;
      }
      .vol-bullets li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 11px;
        width: 8px;
        height: 1px;
        background: var(--cyan);
      }
      .vol-bullets li strong {
        color: var(--text);
        font-weight: 600;
      }
      @media (max-width: 680px) {
        .vol-list {
          gap: 2.4rem;
        }
        .vol-card {
          border-radius: 18px;
        }
        /* logo badge still floats over the photo, just smaller */
        .vol-logo-badge {
          width: 46px;
          height: 46px;
          top: 0.85rem;
          left: 0.85rem;
        }
        .vol-logo-badge img {
          width: 32px;
          height: 32px;
        }
        /* pull meta block out of the photo overlay — no more cramped overlap */
        .vol-hero-overlay {
          display: none;
        }
        .vol-hero-meta {
          position: static;
          padding: 1.4rem 1.5rem 0;
        }
        .vol-hero-meta h3 {
          color: var(--text);
          font-size: clamp(1.4rem, 5vw, 1.7rem);
        }
        .vol-org {
          color: var(--text-2);
        }
        .vol-org .badge-now {
          background: rgba(0, 212, 255, 0.14);
          border-color: rgba(0, 212, 255, 0.32);
        }
        .vol-meta-row {
          color: var(--text-3);
        }
        .vol-activity-chip {
          margin-bottom: 0.7rem;
          font-size: 0.66rem;
          padding: 0.3rem 0.65rem;
        }
        .vol-body {
          padding: 1.3rem 1.5rem 1.7rem;
        }
        .vol-bullets li {
          font-size: 0.92rem;
        }
        .vol-hero .carousel-controls {
          top: 0.85rem;
          right: 0.85rem;
        }
      }
      .edu-card {
        margin-top: 2.5rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        padding: 1.4rem 2rem;
        background: linear-gradient(
          135deg,
          rgba(0, 212, 255, 0.05),
          rgba(77, 143, 255, 0.02)
        );
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
      }
      .edu-card .icon {
        width: 54px;
        height: 54px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        background: rgba(0, 212, 255, 0.1);
        color: var(--cyan);
      }
      .edu-card .icon svg {
        width: 26px;
        height: 26px;
      }
      .edu-card .info h4 {
        font-size: 1.1rem;
        margin-bottom: 0.1rem;
      }
      .edu-card .info p {
        color: var(--text-2);
        font-size: 0.9rem;
        margin: 0;
      }
      .edu-card .info p .mono {
        font-family: var(--mono);
        color: var(--text-3);
        font-size: 0.78rem;
      }

      .projects-list {
        display: flex;
        flex-direction: column;
        gap: 5rem;
      }
      .project {
        display: grid;
        grid-template-columns: 1.3fr 1fr;
        gap: 3rem;
        align-items: center;
      }
      .project.reverse {
        grid-template-columns: 1fr 1.3fr;
      }
      .project.reverse .project-media {
        order: 2;
      }
      .project.reverse .project-info {
        order: 1;
      }
      .project-media {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        min-width: 0;
      }
      .project-visual {
        position: relative;
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--navy-800);
        border: 1px solid var(--line-strong);
        box-shadow:
          0 30px 80px -30px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(0, 212, 255, 0.04);
        padding-top: 32px;
      }
      .project-visual::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 32px;
        background: linear-gradient(180deg, rgba(8, 13, 36, 0.7), transparent);
        z-index: 5;
      }
      .project-visual::after {
        content: "";
        position: absolute;
        top: 10px;
        left: 14px;
        width: 46px;
        height: 10px;
        background-image:
          radial-gradient(circle, #ff5f57 4.5px, transparent 5px),
          radial-gradient(circle, #febc2e 4.5px, transparent 5px),
          radial-gradient(circle, #28c840 4.5px, transparent 5px);
        background-position:
          0 0,
          18px 0,
          36px 0;
        background-repeat: no-repeat;
        background-size: 10px 10px;
        z-index: 6;
      }
      .carousel {
        position: relative;
        width: 100%;
      }
      .carousel-track {
        display: grid;
        width: 100%;
      }
      .carousel-slide {
        grid-column: 1;
        grid-row: 1;
        opacity: 0;
        transition: opacity 0.6s ease;
        pointer-events: none;
        background: #040713;
      }
      .carousel-slide.active {
        opacity: 1;
        pointer-events: auto;
        z-index: 2;
      }
      .carousel-slide img,
      .carousel-slide video {
        display: block;
        width: 100%;
        height: auto;
      }
      .project-visual.single img,
      .project-visual.single video {
        display: block;
        width: 100%;
        height: auto;
        background: #040713;
      }
      .project:has(.project-visual.portrait) {
        grid-template-columns: 1fr 1.4fr;
      }
      .project.reverse:has(.project-visual.portrait) {
        grid-template-columns: 1.4fr 1fr;
      }
      .carousel-controls {
        align-self: center;
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        background: rgba(8, 13, 36, 0.55);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--line-strong);
        padding: 0.4rem 0.6rem;
        border-radius: 99px;
      }
      .carousel-btn {
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 0;
        border-radius: 50%;
        color: var(--text);
        cursor: pointer;
        transition: background 0.2s;
      }
      .carousel-btn:hover {
        background: rgba(0, 212, 255, 0.18);
        color: var(--cyan);
      }
      .carousel-btn svg {
        width: 14px;
        height: 14px;
      }
      .carousel-dots {
        display: flex;
        gap: 0.35rem;
      }
      .dot-btn {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        border: 0;
        background: rgba(var(--surf), 0.2);
        cursor: pointer;
        transition:
          background 0.2s,
          width 0.25s;
        padding: 0;
      }
      .dot-btn.active {
        background: var(--cyan);
        width: 18px;
        border-radius: 99px;
      }
      .project-info .project-num {
        font-family: var(--mono);
        font-size: 0.78rem;
        color: var(--cyan);
        letter-spacing: 0.2em;
        margin-bottom: 0.6rem;
      }
      /* Projects as series: // 01 cyan · // 02 blue · // 03 violet (legend order) */
      .projects-list .project:nth-child(2) .project-num { color: var(--blue); }
      .projects-list .project:nth-child(3) .project-num { color: var(--violet); }
      .project-info h3 {
        font-size: clamp(1.6rem, 2.6vw, 2.2rem);
        margin-bottom: 1rem;
        letter-spacing: -0.02em;
      }
      .project-info p {
        color: var(--text-2);
        margin-bottom: 1.4rem;
        line-height: 1.7;
      }
      .project-info code {
        font-family: var(--mono);
        color: var(--cyan);
        font-size: 0.85em;
      }
      .tech-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin-bottom: 1.6rem;
      }
      .tech-pills span {
        font-family: var(--mono);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.35rem 0.75rem;
        background: rgba(0, 212, 255, 0.08);
        color: var(--cyan);
        border: 1px solid rgba(0, 212, 255, 0.2);
        border-radius: 99px;
      }
      .project-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
      }
      .btn-gh {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.75rem 1.3rem;
        background: rgba(var(--surf), 0.04);
        color: var(--text);
        border: 1px solid var(--line-strong);
        border-radius: 99px;
        font-weight: 600;
        font-size: 0.88rem;
        text-decoration: none;
        transition: all 0.25s;
      }
      .btn-gh:hover {
        background: var(--text);
        color: var(--navy-950);
        border-color: var(--text);
      }
      .btn-gh svg {
        width: 16px;
        height: 16px;
      }

      .skill-cats {
        display: flex;
        flex-direction: column;
        gap: 3rem;
      }
      /* Each skill category is a "series" — legend chip + tinted rule, like a chart legend */
      .skill-cat { --cat: var(--cyan); --cat-soft: var(--cyan-soft); }
      .skill-cat:nth-child(2) { --cat: var(--blue); --cat-soft: var(--blue-soft); }
      .skill-cat:nth-child(3) { --cat: var(--violet); --cat-soft: var(--violet-soft); }
      .skill-cat:nth-child(4) { --cat: var(--magenta); --cat-soft: var(--magenta-soft); }
      .skill-cat h3 {
        font-family: var(--mono);
        font-size: 0.85rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin-bottom: 1.4rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .skill-cat h3::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 3px;
        background: var(--cat);
        flex-shrink: 0;
      }
      .skill-cat h3::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          color-mix(in srgb, var(--cat) 40%, transparent),
          transparent
        );
      }
      .skill-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 1rem;
      }
      .skill-card {
        position: relative;
        background: linear-gradient(
          180deg,
          rgba(var(--surf), 0.04),
          rgba(var(--surf), 0.01)
        );
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 1.4rem 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
        text-align: center;
        transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        overflow: hidden;
      }
      .skill-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at center top,
          var(--cat-soft),
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.4s;
      }
      .skill-card:hover {
        transform: translateY(-4px);
        border-color: var(--cat);
        box-shadow: 0 18px 40px -16px color-mix(in srgb, var(--cat) 30%, transparent);
      }
      .skill-card:hover::before {
        opacity: 1;
      }
      .skill-card .icon-wrap {
        width: 46px;
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
      }
      .skill-card .icon-wrap img,
      .skill-card .icon-wrap svg {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 12px color-mix(in srgb, var(--cat) 30%, transparent));
        transition: transform 0.3s;
        color: var(--cat);
      }
      .skill-card:hover .icon-wrap img,
      .skill-card:hover .icon-wrap svg {
        transform: scale(1.1);
      }
      .skill-card .skill-name {
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--text);
        position: relative;
        z-index: 1;
      }
      .skill-card .icon-fallback {
        width: 46px;
        height: 46px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--cat), color-mix(in srgb, var(--cat) 55%, var(--blue)));
        color: var(--navy-950);
        font-family: var(--display);
        font-weight: 700;
        font-size: 1.2rem;
        border-radius: 12px;
      }
      .certs-list {
        margin-top: 2.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 0.8rem;
      }
      .cert-row {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        padding: 0.9rem 1.1rem;
        background: rgba(var(--surf), 0.02);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        font-size: 0.88rem;
        color: var(--text-2);
      }
      .cert-row svg {
        flex-shrink: 0;
        color: var(--cyan);
      }
      .cert-row strong {
        color: var(--text);
        font-weight: 600;
      }

      .contact-section {
        padding: 6rem 2rem 5rem;
      }
      .contact-card {
        max-width: var(--maxw);
        margin: 0 auto;
        position: relative;
        background:
          radial-gradient(
            80% 100% at 50% 0%,
            rgba(0, 212, 255, 0.12),
            transparent 70%
          ),
          linear-gradient(135deg, var(--navy-700), var(--navy-800));
        border: 1px solid var(--line-strong);
        border-radius: 32px;
        padding: 5rem 3rem;
        text-align: center;
        overflow: hidden;
      }
      .contact-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(125, 148, 220, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(125, 148, 220, 0.07) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(
          ellipse at center,
          #000 30%,
          transparent 80%
        );
        -webkit-mask-image: radial-gradient(
          ellipse at center,
          #000 30%,
          transparent 80%
        );
        pointer-events: none;
      }
      .contact-card > * {
        position: relative;
        z-index: 1;
      }
      .contact-card h2 {
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        margin-bottom: 1rem;
      }
      .contact-card p {
        color: var(--text-2);
        max-width: 55ch;
        margin: 0 auto 2.2rem;
        font-size: 1.05rem;
      }
      .contact-actions {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
      }

      footer {
        padding: 3rem 2rem 2rem;
        border-top: 1px solid var(--line);
      }
      .footer-inner {
        max-width: var(--maxw);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1.5rem;
      }
      .footer-inner .copy {
        font-size: 0.85rem;
        color: var(--text-3);
        font-family: var(--mono);
      }
      .footer-inner .socials a {
        width: 38px;
        height: 38px;
      }
      .footer-inner .socials svg {
        width: 16px;
        height: 16px;
      }

      /* loading state */
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: var(--navy-950);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.4rem;
        transition: opacity 0.5s ease;
      }
      .loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 2px solid var(--line);
        border-top-color: var(--cyan);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-text {
        font-family: var(--mono);
        font-size: 0.78rem;
        color: var(--text-3);
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      /* ============ PROJECT DETAIL PAGE ============ */
      #projectPage {
        display: none;
        min-height: 100vh;
        padding-bottom: 6rem;
      }
      @keyframes proj-fadein {
        from { opacity: 0; transform: translateY(22px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .proj-page-inner {
        padding-top: 6rem;
      }
      .proj-page-inner > * {
        animation: proj-fadein 0.5s ease both;
      }
      .proj-page-inner > *:nth-child(1) { animation-delay: 0s; }
      .proj-page-inner > *:nth-child(2) { animation-delay: 0.06s; }
      .proj-page-inner > *:nth-child(3) { animation-delay: 0.12s; }
      .proj-page-inner > *:nth-child(4) { animation-delay: 0.18s; }
      .proj-page-inner > *:nth-child(5) { animation-delay: 0.22s; }
      .proj-page-inner > *:nth-child(n+6) { animation-delay: 0.26s; }

      .proj-back {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-family: var(--mono);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-3);
        text-decoration: none;
        margin-bottom: 2.8rem;
        transition: color 0.2s;
      }
      .proj-back:hover { color: var(--cyan); }
      .proj-back svg { width: 16px; height: 16px; flex-shrink: 0; }

      .proj-page-header { margin-bottom: 2.2rem; }
      .proj-page-header .project-num { margin-bottom: 0.85rem; font-size: 0.85rem; }
      .proj-page-title {
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.08;
        letter-spacing: -0.03em;
        margin: 0;
        color: var(--text);
      }

      .proj-page-media {
        margin-bottom: 2.8rem;
        border-radius: 20px;
        overflow: hidden;
      }
      .proj-page-img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 20px;
      }
      .proj-page-media .project-visual { border-radius: 20px; }
      .proj-page-media .project-media { margin: 0; }

      /* Stats */
      .proj-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 2.8rem;
      }
      .proj-stat {
        flex: 1;
        min-width: 150px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        text-align: left;
        gap: 0.45rem;
        padding: 1.3rem 1.6rem;
        background: linear-gradient(135deg, rgba(var(--surf),.04), rgba(var(--surf),.01));
        border: 1px solid var(--line-strong);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
      }
      .proj-stat::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--cyan), var(--blue));
      }
      .stat-val {
        font-family: var(--mono);
        font-size: 1.7rem;
        font-weight: 700;
        color: var(--cyan);
        line-height: 1;
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-family: var(--mono);
      }

      /* Description */
      .proj-page-desc {
        font-size: 1.05rem;
        line-height: 1.8;
        color: var(--text-2);
        margin-bottom: 3.5rem;
        max-width: 800px;
      }

      /* Section blocks */
      .proj-section { margin-bottom: 3.8rem; }
      .proj-section-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 1.6rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }
      .proj-section-title::before {
        content: '';
        display: block;
        width: 26px;
        height: 2px;
        background: linear-gradient(90deg, var(--cyan), var(--blue));
        flex-shrink: 0;
        border-radius: 2px;
      }

      /* Tools grid */
      .proj-tools-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.9rem;
      }
      .proj-tool {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        padding: 1.1rem 1.3rem;
        background: linear-gradient(135deg, rgba(var(--surf),.03), transparent);
        border: 1px solid var(--line);
        border-radius: 14px;
        transition: border-color 0.25s, transform 0.2s;
      }
      .proj-tool:hover {
        border-color: rgba(0,212,255,.32);
        transform: translateY(-2px);
      }
      .proj-tool-icon {
        width: 34px;
        height: 34px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 2px;
      }
      .proj-tool-icon img {
        width: 28px;
        height: 28px;
        object-fit: contain;
      }
      .proj-tool-info { display: flex; flex-direction: column; gap: 0.3rem; }
      .proj-tool-name {
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.2;
      }
      .proj-tool-desc {
        font-size: 0.83rem;
        color: var(--text-2);
        line-height: 1.55;
      }

      /* Process flow — numbered grid */
      .proj-process {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
        gap: 0.9rem;
        position: relative;
      }
      .proc-step {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        padding: 1.3rem 1.2rem 1.4rem;
        background: linear-gradient(160deg, rgba(0,212,255,.05) 0%, rgba(var(--surf),.02) 100%);
        border: 1px solid var(--line);
        border-radius: 14px;
        position: relative;
        transition: border-color 0.25s, transform 0.2s;
      }
      .proc-step:hover {
        border-color: rgba(0,212,255,.3);
        transform: translateY(-2px);
      }
      .proc-step::after {
        content: attr(data-arrow);
        position: absolute;
        top: 50%;
        right: -0.55rem;
        transform: translateY(-50%);
        font-size: 0.7rem;
        color: var(--cyan);
        opacity: 0.6;
        font-family: var(--mono);
        z-index: 1;
      }
      .proc-num {
        font-family: var(--mono);
        font-size: 0.68rem;
        color: var(--cyan);
        letter-spacing: 0.14em;
        font-weight: 700;
      }
      .proc-name {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.3;
      }
      .proc-desc {
        font-size: 0.78rem;
        color: var(--text-3);
        line-height: 1.55;
        flex: 1;
      }

      /* Embed */
      .proj-embed-note {
        font-size: 0.85rem;
        color: var(--text-3);
        margin-bottom: 1rem;
        font-style: italic;
      }
      .proj-embed-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: rgba(var(--surf),.02);
      }
      .proj-embed-wrap iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Actions */
      .proj-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem;
        padding-top: 0.5rem;
      }
      .proj-action-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.8rem 1.5rem;
        border-radius: 99px;
        font-size: 0.88rem;
        font-weight: 500;
        text-decoration: none;
        border: 1px solid var(--line-strong);
        color: var(--text-2);
        background: rgba(var(--surf),.04);
        transition: all 0.25s;
      }
      .proj-action-btn:hover {
        border-color: var(--cyan);
        color: var(--cyan);
        background: rgba(0,212,255,.08);
      }
      .proj-action-btn svg { width: 16px; height: 16px; }
      .proj-action-primary {
        background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
        border-color: transparent;
        color: var(--navy-950);
      }
      .proj-action-primary:hover {
        opacity: 0.88;
        color: var(--navy-950);
        border-color: transparent;
        background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
      }

      /* View Details link on project cards */
      .proj-card-link {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-family: var(--mono);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--cyan);
        text-decoration: none;
        transition: gap 0.2s;
      }
      .proj-card-link:hover { gap: 0.7rem; }
      .proj-card-link svg { width: 14px; height: 14px; }

      /* ============ PROJECT PAGES — RESPONSIVE (tablet + mobile only) ============ */
      /* Inset content once viewport drops below the centered container width
         (desktop > 1240px keeps its current comfortable margins, untouched) */
      @media (max-width: 1240px) {
        .proj-page-inner {
          padding-left: 2rem;
          padding-right: 2rem;
        }
      }

      /* Tablet */
      @media (max-width: 980px) {
        .proj-page-inner { padding-top: 5rem; }
        .proj-back { margin-bottom: 2rem; }
        .proj-page-header { margin-bottom: 1.8rem; }
        .proj-page-media { margin-bottom: 2.2rem; }
        .proj-section { margin-bottom: 3rem; }
      }

      /* Mobile */
      @media (max-width: 680px) {
        .proj-page-inner {
          padding-top: 4.5rem;
          padding-left: 1.25rem;
          padding-right: 1.25rem;
        }
        .proj-back { margin-bottom: 1.6rem; font-size: 0.74rem; }
        .proj-page-header { margin-bottom: 1.5rem; }
        .proj-page-header .project-num { font-size: 0.78rem; margin-bottom: 0.6rem; }
        .proj-page-title { font-size: clamp(1.7rem, 7vw, 2.5rem); }

        .proj-page-media { margin-bottom: 2rem; border-radius: 14px; }
        .proj-page-img { border-radius: 14px; }

        /* Stats — keep 3-up but shrink to fit small screens */
        .proj-stats {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 0.6rem;
        }
        .proj-stat {
          min-width: 0;
          padding: 0.95rem 0.7rem;
          border-radius: 13px;
        }
        .stat-val { font-size: 1.3rem; }
        .stat-label { font-size: 0.62rem; letter-spacing: 0.08em; }

        .proj-page-desc { font-size: 0.98rem; line-height: 1.75; margin-bottom: 2.6rem; }
        .proj-section { margin-bottom: 2.8rem; }
        .proj-section-title { font-size: 1.1rem; margin-bottom: 1.3rem; }

        /* Tools — single column */
        .proj-tools-grid { grid-template-columns: 1fr; gap: 0.8rem; }
        .proj-tool { padding: 1.05rem 1.15rem; }

        /* Process — single column, drop the connector arrows */
        .proj-process { grid-template-columns: 1fr; }
        .proc-step::after { display: none; }

        /* Embed — tall usable area instead of a short 16:9 strip */
        .proj-embed-wrap { aspect-ratio: auto; height: 70vh; min-height: 340px; }

        /* Actions — full-width stacked buttons */
        .proj-actions { flex-direction: column; gap: 0.7rem; }
        .proj-action-btn { width: 100%; justify-content: center; }
      }

      /* Extra-small phones — stack the same left-aligned cards full width */
      @media (max-width: 400px) {
        .proj-stats { grid-template-columns: 1fr; }
      }

      /* ============ SQL WALKTHROUGH — MAIN PORTFOLIO CARD PREVIEW ============ */
      .sql-preview-card {
        background: #020612;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(0, 212, 255, 0.2);
        font-family: var(--mono);
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .sql-preview-topbar {
        background: rgba(0, 0, 0, 0.7);
        padding: 0.6rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(var(--surf), 0.08);
        flex-shrink: 0;
      }
      .sql-preview-circles {
        display: flex;
        gap: 5px;
      }
      .sql-preview-circles span {
        display: block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .sql-preview-circles span:nth-child(1) { background: #ff5f57; }
      .sql-preview-circles span:nth-child(2) { background: #febc2e; }
      .sql-preview-circles span:nth-child(3) { background: #28c840; }
      .sql-preview-label {
        font-size: 0.65rem;
        color: #636e72;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
      .sql-preview-body {
        padding: 1.1rem 1.3rem 1.3rem;
        overflow: hidden;
        flex: 1;
        position: relative;
      }
      .sql-preview-body::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 60px;
        background: linear-gradient(to bottom, transparent, #020612);
      }
      .sql-preview-body code {
        font-size: 0.78rem;
        line-height: 1.8;
        white-space: pre;
        display: block;
        color: #8892a4;
      }

      /* ============ SQL WALKTHROUGH — PROJECT DETAIL PAGE ============ */
      .wt-intro {
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.06), rgba(77, 143, 255, 0.04));
        border: 1px solid rgba(0, 212, 255, 0.18);
        border-radius: 18px;
        padding: 2rem 2.4rem;
        margin-bottom: 1.8rem;
        display: flex;
        flex-direction: column;
        gap: 1.4rem;
      }
      .wt-intro-flow {
        display: flex;
        align-items: center;
        gap: 1.4rem;
        flex-wrap: wrap;
      }
      .wt-flow-step {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.45rem;
      }
      .wt-flow-step img {
        width: 44px;
        height: 44px;
        object-fit: contain;
      }
      .wt-flow-step span {
        font-family: var(--mono);
        font-size: 0.65rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
      .wt-flow-arrow {
        font-family: var(--mono);
        font-size: 1.3rem;
        color: var(--cyan);
        opacity: 0.55;
        line-height: 1;
      }
      .wt-intro-sub {
        font-size: 0.94rem;
        color: var(--text-2);
        line-height: 1.75;
        margin: 0;
      }

      /* Step cards */
      .wt-steps { display: flex; flex-direction: column; gap: 1.1rem; margin-bottom: 1.5rem; }
      .wt-step {
        display: flex;
        border-radius: 16px;
        overflow: hidden;
        background: linear-gradient(160deg, rgba(var(--surf), 0.03), rgba(var(--surf), 0.01));
        border: 1px solid var(--line);
        transition: border-color 0.25s ease, transform 0.2s ease;
      }
      .wt-step:hover { transform: translateX(5px); border-color: rgba(var(--surf), 0.12); }
      .wt-step-bar { width: 4px; flex-shrink: 0; }
      .wt-step-content { padding: 1.6rem 1.8rem 1.7rem; flex: 1; min-width: 0; }

      .wt-step-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .wt-step-left { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-width: 0; }
      .wt-step-num {
        font-family: var(--mono);
        font-size: 0.67rem;
        color: var(--text-3);
        letter-spacing: 0.16em;
        font-weight: 600;
      }
      .wt-step-tag {
        display: inline-block;
        font-family: var(--mono);
        font-size: 0.67rem;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        padding: 0.25rem 0.65rem;
        border-radius: 99px;
        border: 1px solid;
        font-weight: 700;
        align-self: flex-start;
      }
      .wt-step-title {
        font-size: 1.08rem;
        font-weight: 700;
        color: var(--text);
        margin: 0;
        line-height: 1.3;
      }
      .wt-step-icon img {
        width: 42px;
        height: 42px;
        object-fit: contain;
        display: block;
        flex-shrink: 0;
      }

      .wt-step-desc {
        font-size: 0.9rem;
        color: var(--text-2);
        line-height: 1.75;
        margin: 0 0 1.4rem;
      }

      /* Code block */
      .wt-code-block {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(var(--surf), 0.09);
      }
      .wt-code-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 1rem;
        background: rgba(0, 0, 0, 0.6);
        border-bottom: 1px solid rgba(var(--surf), 0.07);
        gap: 0.8rem;
      }
      .wt-code-header-left {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .wt-code-circles {
        display: flex;
        gap: 4px;
      }
      .wt-code-circles span {
        display: block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }
      .wt-code-circles span:nth-child(1) { background: #ff5f57; }
      .wt-code-circles span:nth-child(2) { background: #febc2e; }
      .wt-code-circles span:nth-child(3) { background: #28c840; }
      .wt-code-label {
        font-family: var(--mono);
        font-size: 0.7rem;
        color: #636e72;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .wt-code-copy {
        font-family: var(--mono);
        font-size: 0.68rem;
        color: var(--text-3);
        background: none;
        border: 1px solid rgba(var(--surf), 0.12);
        border-radius: 5px;
        padding: 0.22rem 0.6rem;
        cursor: pointer;
        transition: color 0.2s, border-color 0.2s;
        flex-shrink: 0;
      }
      .wt-code-copy:hover { color: var(--cyan); border-color: var(--cyan); }
      .wt-code-copy.copied { color: #28c840; border-color: #28c840; }
      .wt-code-body {
        background: #020612;
        padding: 1.3rem 1.5rem;
        overflow-x: auto;
      }
      .wt-code {
        font-family: var(--mono);
        font-size: 0.85rem;
        line-height: 1.85;
        white-space: pre;
        display: block;
      }

      /* SQL syntax colours */
      .sql-kw     { color: #00d4ff; font-weight: 600; }
      .sql-fn     { color: #74b9ff; }
      .sql-str    { color: #ffa502; }
      .sql-ident  { color: #c9b1ff; }
      .sql-num    { color: #fd79a8; }
      .sql-comment{ color: #4a5568; font-style: italic; }

      /* Outro */
      .wt-outro {
        display: flex;
        align-items: flex-start;
        gap: 1.4rem;
        padding: 1.8rem 2rem;
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.07), rgba(77, 143, 255, 0.04));
        border: 1px solid rgba(0, 212, 255, 0.22);
        border-radius: 18px;
      }
      .wt-outro-badge {
        width: 50px;
        height: 50px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 212, 255, 0.12);
        border: 1px solid rgba(0, 212, 255, 0.28);
        border-radius: 50%;
        font-size: 1.4rem;
        color: var(--cyan);
      }
      .wt-outro-title {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 0.5rem;
      }
      .wt-outro-desc {
        font-size: 0.88rem;
        color: var(--text-2);
        line-height: 1.75;
        margin: 0;
      }

      /* Walkthrough — tablet */
      @media (max-width: 980px) {
        .wt-step-content { padding: 1.5rem 1.6rem; }
      }

      /* Walkthrough + SQL preview — mobile */
      @media (max-width: 680px) {
        .wt-step-content { padding: 1.2rem 1.2rem 1.4rem; }
        .wt-step-header { gap: 0.7rem; }
        .wt-step-title { font-size: 1rem; }
        .wt-step-icon img { width: 34px; height: 34px; }
        .wt-step-desc { font-size: 0.86rem; }
        .wt-intro { padding: 1.4rem 1.5rem; gap: 1.1rem; }
        .wt-intro-flow { gap: 0.7rem; justify-content: center; }
        .wt-flow-step img { width: 38px; height: 38px; }
        .wt-intro-sub { font-size: 0.88rem; }
        .wt-code-body { padding: 1rem; }
        .wt-code { font-size: 0.74rem; line-height: 1.7; }
        .wt-code-label { font-size: 0.62rem; }
        .wt-code-copy { font-size: 0.62rem; padding: 0.2rem 0.5rem; }
        .wt-outro { flex-direction: column; gap: 1rem; padding: 1.4rem; }

        /* SQL terminal preview on the main portfolio grid */
        .sql-preview-body { max-height: 230px; }
        .sql-preview-body code { font-size: 0.72rem; line-height: 1.7; }
        .sql-preview-label { font-size: 0.58rem; }
      }

      /* ============ REPORT INSIGHTS (Mexico Toys case-study) ============ */
      .report-meta {
        font-family: var(--mono);
        font-size: 0.78rem;
        color: var(--text-3);
        letter-spacing: 0.04em;
        margin: -0.6rem 0 1.8rem;
      }
      .report-kpis {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0.8rem;
        margin-bottom: 3rem;
      }
      .report-kpi {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        padding: 1.1rem 1.2rem;
        background: linear-gradient(160deg, rgba(0,212,255,.05), rgba(var(--surf),.01));
        border: 1px solid var(--line);
        border-radius: 14px;
      }
      .rk-val { font-family: var(--mono); font-size: 1.4rem; font-weight: 700; color: var(--cyan); line-height: 1; }
      .rk-label { font-size: 0.8rem; font-weight: 600; color: var(--text); }
      .rk-sub { font-family: var(--mono); font-size: 0.68rem; color: var(--text-3); }

      .report-subhead {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 1.3rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .report-subhead::before {
        content: '';
        width: 18px; height: 2px;
        background: linear-gradient(90deg, var(--cyan), var(--blue));
        border-radius: 2px;
      }

      .report-insights-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin-bottom: 3rem;
      }
      .report-insight {
        padding: 1.4rem 1.5rem;
        background: linear-gradient(160deg, rgba(var(--ri-rgb),.05), rgba(var(--surf),.01));
        border: 1px solid var(--line);
        border-left: 3px solid var(--ri);
        border-radius: 12px;
      }
      .ri-head { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.7rem; }
      .ri-num { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--ri); }
      .ri-title { font-size: 0.98rem; font-weight: 700; color: var(--text); margin: 0; line-height: 1.25; }
      .ri-text { font-size: 0.85rem; color: var(--text-2); line-height: 1.65; margin: 0; }

      .report-rootcause { margin-bottom: 3rem; }
      .rc-banner {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1.4rem 1.6rem;
        background: linear-gradient(135deg, rgba(255,107,107,.1), rgba(255,107,107,.03));
        border: 1px solid rgba(255,107,107,.3);
        border-radius: 14px 14px 0 0;
      }
      .rc-banner-main { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
      .rc-headline { font-family: var(--mono); font-size: 1.05rem; font-weight: 700; color: var(--text); }
      .rc-drop { font-family: var(--mono); font-size: 1.05rem; font-weight: 700; color: #ff6b6b; }
      .rc-driver { font-size: 0.8rem; color: var(--text-2); }
      .rc-bars {
        padding: 1.5rem 1.6rem;
        background: rgba(var(--surf),.02);
        border: 1px solid var(--line);
        border-top: none;
      }
      .rc-bars-title {
        font-family: var(--mono);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-3);
        margin-bottom: 1.1rem;
      }
      .rc-bar-row {
        display: grid;
        grid-template-columns: 150px 1fr 56px;
        align-items: center;
        gap: 0.9rem;
        margin-bottom: 0.7rem;
      }
      .rc-bar-row:last-child { margin-bottom: 0; }
      .rc-bar-label { font-size: 0.82rem; color: var(--text-2); }
      .rc-bar-track { height: 9px; background: rgba(var(--surf),.05); border-radius: 99px; overflow: hidden; }
      .rc-bar-fill { display: block; height: 100%; background: linear-gradient(90deg, #ff6b6b, var(--magenta)); border-radius: 99px; }
      .rc-bar-pct { font-family: var(--mono); font-size: 0.82rem; font-weight: 600; color: #ff6b6b; text-align: right; }
      .rc-conclusion {
        font-size: 0.9rem;
        color: var(--text-2);
        line-height: 1.7;
        padding: 1.3rem 1.6rem;
        background: linear-gradient(135deg, rgba(0,212,255,.05), rgba(var(--surf),.01));
        border: 1px solid var(--line);
        border-top: none;
        border-radius: 0 0 14px 14px;
        margin: 0;
      }

      .report-recs { display: flex; flex-direction: column; gap: 0.9rem; margin-bottom: 3rem; }
      .rec-card {
        padding: 1.3rem 1.5rem;
        background: linear-gradient(135deg, rgba(var(--surf),.03), transparent);
        border: 1px solid var(--line);
        border-radius: 14px;
      }
      .rec-top { display: flex; align-items: center; gap: 0.9rem; margin-bottom: 0.6rem; }
      .rec-priority {
        font-family: var(--mono);
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        padding: 0.28rem 0.6rem;
        border-radius: 99px;
        color: var(--rec);
        background: rgba(var(--rec-rgb),.13);
        border: 1px solid rgba(var(--rec-rgb),.32);
        flex-shrink: 0;
      }
      .rec-title { font-size: 0.98rem; font-weight: 700; color: var(--text); margin: 0; }
      .rec-text { font-size: 0.85rem; color: var(--text-2); line-height: 1.65; margin: 0 0 0.7rem; }
      .rec-impact { font-size: 0.82rem; color: var(--cyan); line-height: 1.55; margin: 0; padding-top: 0.7rem; border-top: 1px dashed var(--line); }
      .rec-impact span {
        font-family: var(--mono);
        font-size: 0.64rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-3);
        margin-right: 0.6rem;
      }

      .report-bottomline {
        padding: 1.8rem 2rem;
        background: linear-gradient(135deg, rgba(0,212,255,.08), rgba(77,143,255,.04));
        border: 1px solid rgba(0,212,255,.25);
        border-radius: 18px;
      }
      .bl-head {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 1.2rem;
      }
      .bl-item { display: flex; align-items: flex-start; gap: 1rem; padding: 0.7rem 0; }
      .bl-item + .bl-item { border-top: 1px solid rgba(0,212,255,.12); }
      .bl-num {
        width: 26px; height: 26px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(0,212,255,.15);
        border: 1px solid rgba(0,212,255,.3);
        font-family: var(--mono);
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--cyan);
      }
      .bl-text { font-size: 0.92rem; color: var(--text); line-height: 1.6; padding-top: 0.15rem; }

      /* Report — tablet */
      @media (max-width: 980px) {
        .report-kpis { grid-template-columns: repeat(3, 1fr); }
      }
      /* Report — mobile */
      @media (max-width: 680px) {
        .report-kpis { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
        .report-kpi { padding: 0.95rem 1rem; }
        .rk-val { font-size: 1.2rem; }
        .report-insights-grid { grid-template-columns: 1fr; }
        .rc-banner { flex-direction: column; align-items: flex-start; gap: 0.6rem; padding: 1.2rem 1.3rem; }
        .rc-bars { padding: 1.2rem 1.3rem; }
        .rc-bar-row { grid-template-columns: 88px 1fr 46px; gap: 0.55rem; }
        .rc-bar-label { font-size: 0.72rem; }
        .rc-conclusion { padding: 1.2rem 1.3rem; }
        .rec-card { padding: 1.1rem 1.2rem; }
        .report-bottomline { padding: 1.4rem 1.4rem; }
      }
      @media (max-width: 400px) {
        .report-kpis { grid-template-columns: 1fr; }
      }

      /* ============ WALKTHROUGH (SQL project case-study) ============ */
      .wk-intro-card {
        display: flex;
        align-items: center;
        gap: 2.4rem;
        padding: 2rem 2.2rem;
        background: linear-gradient(135deg, rgba(0,212,255,.06), rgba(77,143,255,.04));
        border: 1px solid var(--line-strong);
        border-radius: 18px;
        margin-bottom: 3rem;
        flex-wrap: wrap;
      }
      .wk-intro-pipeline {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-shrink: 0;
      }
      .wk-pipe-node {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        min-width: 64px;
      }
      .wk-pipe-node img {
        width: 40px; height: 40px;
        object-fit: contain;
        filter: drop-shadow(0 0 8px rgba(0,212,255,.35));
      }
      .wk-pipe-label {
        font-family: var(--mono);
        font-size: .66rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: .1em;
        white-space: nowrap;
      }
      .wk-pipe-arrow {
        font-size: 1.2rem;
        color: var(--cyan);
        flex-shrink: 0;
        margin-bottom: 1.2rem;
      }
      .wk-intro-text { flex: 1; min-width: 220px; }
      .wk-intro-text h3 {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: .5rem;
      }
      .wk-intro-text p {
        font-size: .9rem;
        color: var(--text-2);
        line-height: 1.65;
        margin: 0;
      }

      /* Timeline */
      .wk-timeline { display: flex; flex-direction: column; gap: 0; margin-bottom: 2rem; }
      .wk-step {
        display: grid;
        grid-template-columns: 56px 1fr;
        gap: 0 1.6rem;
      }
      /* Left column: number + line */
      .wk-step-rail { display: flex; flex-direction: column; align-items: center; }
      .wk-step-badge {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(77,143,255,.12));
        border: 1.5px solid var(--cyan);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--mono);
        font-size: .78rem;
        font-weight: 700;
        color: var(--cyan);
        flex-shrink: 0;
        z-index: 1;
      }
      .wk-step-line {
        width: 1.5px;
        flex: 1;
        min-height: 24px;
        background: linear-gradient(to bottom, var(--cyan), transparent);
        opacity: .3;
        margin: 6px 0;
      }
      .wk-step:last-child .wk-step-line { display: none; }

      /* Right column: content card */
      .wk-step-card {
        background: linear-gradient(135deg, rgba(var(--surf),.03), transparent);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1.6rem 1.8rem 1.8rem;
        margin-bottom: 1.4rem;
        transition: border-color .25s;
      }
      .wk-step-card:hover { border-color: rgba(0,212,255,.28); }
      .wk-step-meta {
        display: flex;
        align-items: center;
        gap: .7rem;
        margin-bottom: .85rem;
      }
      .wk-step-icon {
        width: 28px; height: 28px;
        object-fit: contain;
        flex-shrink: 0;
      }
      .wk-step-tag {
        font-family: var(--mono);
        font-size: .68rem;
        text-transform: uppercase;
        letter-spacing: .16em;
        color: var(--text-3);
        padding: .28rem .65rem;
        background: rgba(var(--surf),.04);
        border: 1px solid var(--line);
        border-radius: 99px;
      }
      .wk-step-title {
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: .7rem;
        line-height: 1.25;
      }
      .wk-step-desc {
        font-size: .9rem;
        color: var(--text-2);
        line-height: 1.7;
        margin-bottom: 1.3rem;
      }

      /* Code block */
      .wk-code {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(var(--surf),.08);
      }
      .wk-code-header {
        display: flex;
        align-items: center;
        gap: .7rem;
        padding: .65rem 1rem;
        background: #252832;
        border-bottom: 1px solid rgba(var(--surf),.06);
      }
      .wk-tl { display: flex; gap: 5px; }
      .wk-tl span {
        width: 11px; height: 11px;
        border-radius: 50%;
      }
      .wk-tl .red    { background: #ff5f57; }
      .wk-tl .yellow { background: #febc2e; }
      .wk-tl .green  { background: #28c840; }
      .wk-code-label {
        font-family: var(--mono);
        font-size: .76rem;
        color: rgba(var(--surf),.55);
        letter-spacing: .04em;
      }
      .wk-code-body {
        background: #1e2130;
        padding: 1.2rem 1.3rem;
        overflow-x: auto;
        margin: 0;
      }
      .wk-code-body code {
        font-family: var(--mono);
        font-size: .84rem;
        line-height: 1.8;
        color: #cdd6f4;
        white-space: pre;
        counter-reset: line;
      }
      .wk-code-body .ln {
        display: inline-block;
        width: 2em;
        color: rgba(var(--surf),.22);
        user-select: none;
        margin-right: .8em;
        text-align: right;
      }
      /* SQL syntax colours */
      .sql-kw   { color: #89b4fa; font-weight: 600; }  /* keywords: SELECT/FROM/WHERE/etc */
      .sql-dml  { color: #f38ba8; font-weight: 600; }  /* DML: INSERT/UPDATE/DELETE/ALTER */
      .sql-fn   { color: #a6e3a1; }                     /* functions: ROW_NUMBER/TRIM/etc */
      .sql-str  { color: #a6e3a1; }                     /* string literals */
      .sql-id   { color: #cba6f7; }                     /* backtick identifiers */
      .sql-type { color: #fab387; }                     /* data types: int/text/DATE */
      .sql-num  { color: #f9e2af; }                     /* numbers */
      .sql-cmt  { color: rgba(var(--surf),.35); font-style:italic; }

      /* Outro card */
      .wk-outro {
        display: flex;
        align-items: center;
        gap: 1.2rem;
        padding: 1.4rem 1.8rem;
        background: linear-gradient(135deg, rgba(0,212,255,.08), rgba(77,143,255,.06));
        border: 1px solid rgba(0,212,255,.25);
        border-radius: 14px;
        margin-top: .5rem;
      }
      .wk-outro-icon {
        width: 40px; height: 40px;
        border-radius: 50%;
        background: rgba(0,212,255,.15);
        border: 1px solid rgba(0,212,255,.3);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .wk-outro-icon svg { width: 20px; height: 20px; color: var(--cyan); }
      .wk-outro h4 { font-size: 1rem; color: var(--text); margin-bottom: .25rem; }
      .wk-outro p  { font-size: .85rem; color: var(--text-2); margin: 0; line-height: 1.6; }

      @media (max-width: 680px) {
        .wk-intro-card { gap: 1.4rem; padding: 1.4rem 1.4rem; }
        .wk-step { grid-template-columns: 42px 1fr; gap: 0 1rem; }
        .wk-step-badge { width: 36px; height: 36px; font-size: .7rem; }
        .wk-step-card { padding: 1.2rem 1.3rem 1.4rem; }
        .wk-code-body code { font-size: .78rem; }
      }

      /* ============ FLOATING MOBILE NAV (hidden on desktop) ============ */
      .mobile-nav {
        display: none;
      }

      @media (max-width: 980px) {
        .hero {
          padding: 7rem 1.5rem 4rem;
          min-height: auto;
        }
        .hero-grid {
          grid-template-columns: 1fr;
          gap: 3rem;
          text-align: left;
        }
        .hero-photo {
          order: -1;
          max-width: 340px;
          margin: 0 auto;
          width: 100%;
        }
        .photo-frame {
          width: 100%;
          max-width: 340px;
        }
        .scroll-cue {
          display: none;
        }
        .about-grid {
          grid-template-columns: 1fr;
          gap: 2.5rem;
        }
        .project,
        .project.reverse,
        .project:has(.project-visual.portrait),
        .project.reverse:has(.project-visual.portrait) {
          grid-template-columns: 1fr;
          gap: 1.6rem;
        }
        .project.reverse .project-media {
          order: 1;
        }
        .project.reverse .project-info {
          order: 2;
        }

        /* hide top-bar navigation links, hamburger, and resume CTA — replaced by floating nav */
        .nav-links,
        .nav-links.open,
        .nav-toggle,
        .nav-cta {
          display: none !important;
        }

        /* floating bottom nav */
        .mobile-nav {
          display: flex;
          position: fixed;
          left: 50%;
          bottom: max(1rem, env(safe-area-inset-bottom, 0));
          transform: translateX(-50%);
          z-index: 60;
          align-items: center;
          gap: 0.25rem;
          padding: 0.45rem;
          background: rgba(var(--glass), 0.78);
          backdrop-filter: blur(20px) saturate(180%);
          -webkit-backdrop-filter: blur(20px) saturate(180%);
          border: 1px solid var(--line-strong);
          border-radius: 99px;
          box-shadow:
            0 18px 50px -16px rgba(0, 0, 0, 0.8),
            0 0 0 1px rgba(0, 212, 255, 0.05);
          max-width: calc(100% - 1.5rem);
        }
        .mobile-nav-item {
          width: 44px;
          height: 44px;
          flex-shrink: 0;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          border-radius: 99px;
          color: var(--text-2);
          text-decoration: none;
          transition:
            background 0.25s ease,
            color 0.25s ease,
            transform 0.2s ease,
            box-shadow 0.25s ease;
          -webkit-tap-highlight-color: transparent;
        }
        .mobile-nav-item svg {
          width: 21px;
          height: 21px;
          display: block;
        }
        .mobile-nav-item:hover,
        .mobile-nav-item:focus-visible {
          color: var(--text);
          background: rgba(var(--surf), 0.05);
        }
        .mobile-nav-item.active {
          background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%);
          color: var(--navy-950);
          box-shadow: 0 8px 22px -8px rgba(0, 212, 255, 0.65);
        }
        .mobile-nav-item.active:hover {
          color: var(--navy-950);
        }

        /* leave room above the page-bottom so floating nav never covers content */
        body {
          padding-bottom: 96px;
        }
        section {
          padding: 5rem 1.5rem;
        }
        .contact-card {
          padding: 3.5rem 1.8rem;
        }
      }
      @media (max-width: 560px) {
        .hero h1 {
          font-size: clamp(2.6rem, 12vw, 3.8rem);
        }
        .hero-actions {
          gap: 0.7rem;
        }
        .btn-primary,
        .btn-ghost {
          padding: 0.85rem 1.3rem;
          font-size: 0.88rem;
        }
        .stats-grid {
          grid-template-columns: 1fr 1fr;
          gap: 0.7rem;
        }
        .stat-card {
          padding: 1.2rem 1rem;
        }
        .stat-card .num {
          font-size: 1.8rem;
        }
        .skill-grid {
          grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
          gap: 0.7rem;
        }
        .timeline {
          padding-left: 1.6rem;
        }
        .tl-item::before {
          left: -1.6rem;
        }
        .tl-card {
          padding: 1.4rem 1.3rem;
        }
        .float-card {
          font-size: 0.7rem;
          padding: 0.7rem 0.9rem;
        }
        .float-card .num {
          font-size: 0.95rem;
        }
      }

      /* ============================================================
         PROJECT DETAIL PAGE
      ============================================================ */
      #projectPage { display: none; }
      .proj-page-inner {
        padding: 7rem 0 5rem;
        min-height: 100vh;
      }
      /* Back button */
      .proj-back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        color: var(--text-2);
        font-family: var(--mono);
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        text-decoration: none;
        margin-bottom: 3rem;
        transition: color 0.2s;
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
      }
      .proj-back-btn:hover { color: var(--cyan); }
      .proj-back-btn svg  { width: 16px; height: 16px; }
      /* Header */
      .proj-page-header { margin-bottom: 2.5rem; }
      .proj-page-header h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin: 0.5rem 0 1.5rem;
      }
      .proj-desc {
        font-size: 1.05rem;
        color: var(--text-2);
        line-height: 1.75;
        max-width: 72ch;
        margin: 1.5rem 0;
      }
      /* Stat chips */
      .proj-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem;
        margin: 1.6rem 0;
      }
      .proj-stat {
        display: flex;
        flex-direction: column;
        padding: 0.8rem 1.4rem;
        background: rgba(0, 212, 255, 0.06);
        border: 1px solid rgba(0, 212, 255, 0.22);
        border-radius: 12px;
        min-width: 110px;
      }
      .proj-stat-value {
        font-family: var(--mono);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--cyan);
        line-height: 1;
      }
      .proj-stat-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-3);
        margin-top: 0.35rem;
      }
      /* Full-width media on detail page */
      .proj-media-full {
        margin: 2.5rem 0;
        border-radius: 20px;
        overflow: hidden;
      }
      .proj-media-full .project-visual { border-radius: 0; }
      /* Section headings */
      .proj-section { margin-top: 4.5rem; }
      .proj-section-title {
        display: flex;
        align-items: center;
        gap: 1.2rem;
        font-family: var(--mono);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--text-3);
        margin-bottom: 2rem;
      }
      .proj-section-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--line-strong), transparent);
      }
      /* Tools list */
      .proj-tools-list {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      .proj-tool-row {
        display: flex;
        align-items: center;
        gap: 1.4rem;
        padding: 1.2rem 1.6rem;
        background: linear-gradient(135deg, rgba(var(--surf),.03), rgba(var(--surf),0));
        border: 1px solid var(--line);
        border-radius: 14px;
        transition: border-color 0.3s, transform 0.25s;
      }
      .proj-tool-row:hover {
        border-color: var(--cyan);
        transform: translateX(4px);
      }
      .proj-tool-icon {
        width: 44px;
        height: 44px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .proj-tool-icon img {
        width: 40px;
        height: 40px;
        object-fit: contain;
        display: block;
      }
      .proj-tool-info { flex: 1; min-width: 0; }
      .proj-tool-info strong {
        display: block;
        color: var(--text);
        font-size: 1rem;
        margin-bottom: 0.28rem;
      }
      .proj-tool-info p {
        color: var(--text-2);
        font-size: 0.9rem;
        line-height: 1.55;
        margin: 0;
      }
      /* Process flow */
      .proj-process-flow {

    <script>
      const STORAGE_KEY = "moamen_portfolio_overrides_v1";

      async function loadData() {
        // Fetch base data.json
        let base = {};
        try {
          const res = await fetch("data.json?t=" + Date.now());
          if (!res.ok) throw new Error("data.json not found");
          base = await res.json();
        } catch (err) {
          console.error("Could not load data.json:", err);
          document.getElementById("loadingOverlay").innerHTML =
            '<div style="text-align:center;padding:2rem;max-width:480px"><h2 style="color:var(--cyan);margin-bottom:1rem">data.json missing</h2><p style="color:var(--text-2)">Make sure data.json sits next to index.html. If you opened index.html via file:// some browsers block local fetch — use a local server (e.g. <code style="font-family:var(--mono);color:var(--cyan)">python3 -m http.server</code>) or deploy.</p></div>';
          throw err;
        }
        // Merge with localStorage overrides if present
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const overrides = JSON.parse(raw);
            // overrides REPLACES base entirely (full snapshot model — admin saves full state)
            return overrides;
          }
        } catch (e) {
          console.warn("Failed to read localStorage overrides", e);
        }
        return base;
      }

      let _dataEN = null; // original English data — Arabic overrides merge on top

      // Deep-merge Arabic overrides onto the English base.
      // Arrays merge element-by-element so overrides can be partial ({title} only, etc).
      function deepMerge(base, ovr) {
        if (Array.isArray(base) && Array.isArray(ovr)) {
          const out = base.map((item, i) =>
            i < ovr.length && ovr[i] != null ? deepMerge(item, ovr[i]) : item,
          );
          if (ovr.length > base.length) out.push(...ovr.slice(base.length));
          return out;
        }
        if (
          base && ovr &&
          typeof base === "object" && typeof ovr === "object" &&
          !Array.isArray(base) && !Array.isArray(ovr)
        ) {
          const out = { ...base };
          for (const k of Object.keys(ovr)) {
            out[k] = k in out ? deepMerge(out[k], ovr[k]) : ovr[k];
          }
          return out;
        }
        return ovr === undefined ? base : ovr;

      // ── SQL syntax highlighter ───────────────────────────────────────────
      function sqlHighlight(raw) {
        // Step 1: HTML-escape the raw SQL
        let s = raw
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        // Step 2: highlight string literals first (before keywords touch them)
        s = s.replace(/'([^']*)'/g, "<span class='sql-str'>'$1'</span>");

        // Step 3: backtick identifiers
        s = s.replace(/`([^`]+)`/g, "<span class='sql-id'>`$1`</span>");

        // Step 4: DML / DDL verbs (red-ish)
        const dml = ['INSERT','UPDATE','DELETE','CREATE','ALTER','DROP','MODIFY'];
        dml.forEach(k => {
          s = s.replace(new RegExp(`\\b(${k})\\b`, 'g'), "<span class='sql-dml'>$1</span>");
        });

        // Step 5: query keywords (blue)
        const kw = ['SELECT','FROM','WHERE','JOIN','ON','AND','OR','NOT','INTO',
                    'SET','TABLE','COLUMN','DEFAULT','NULL','ENGINE','CHARSET',
                    'COLLATE','AS','BY','OVER','PARTITION','TRAILING'];
        kw.forEach(k => {
          s = s.replace(new RegExp(`\\b(${k})\\b`, 'g'), "<span class='sql-kw'>$1</span>");
        });

        // Step 6: functions (green)
        const fns = ['ROW_NUMBER','STR_TO_DATE','TRIM'];
        fns.forEach(k => {
          s = s.replace(new RegExp(`\\b(${k})\\b`, 'g'), "<span class='sql-fn'>$1</span>");
        });

        // Step 7: data types (orange)
        const types = ['int','text','DATE','IS'];
        types.forEach(k => {
          s = s.replace(new RegExp(`\\b(${k})\\b`, 'g'), "<span class='sql-type'>$1</span>");
        });

        // Step 8: numbers
        s = s.replace(/\b(\d+)\b/g, "<span class='sql-num'>$1</span>");

        // Step 9: add line numbers
        const lines = s.split('\n');
        return lines.map((ln, i) =>
          `<span class='ln'>${i + 1}</span>${ln}`
        ).join('\n');
      }

    <!-- ============ INTERACTION LAYER ============ -->
    <script>
      // ── SQL syntax highlighter ──────────────────────────────────────────
      function highlightSQL(raw) {
        const KW = "SELECT|FROM|WHERE|INSERT|INTO|UPDATE|SET|DELETE|CREATE|TABLE|ALTER|MODIFY|COLUMN|DROP|ADD|JOIN|LEFT|RIGHT|INNER|OUTER|ON|AND|OR|NOT|IS|NULL|AS|OVER|PARTITION|BY|ORDER|GROUP|HAVING|CASE|WHEN|THEN|ELSE|END|LIKE|IN|BETWEEN|DEFAULT|ENGINE|CHARSET|COLLATE|INT|TEXT|DATE|VALUES|WITH|UNION|ALL|DISTINCT|TRAILING|LEADING|IF|EXISTS";
        const FN = "ROW_NUMBER|TRIM|STR_TO_DATE|COUNT|SUM|AVG|MAX|MIN|COALESCE|ISNULL|LENGTH|UPPER|LOWER|CONCAT|REPLACE|SUBSTRING|DATEDIFF|NOW|YEAR|MONTH|NULLIF";
        return raw
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/'([^']*)'/g, `<span class="sql-str">'$1'</span>`)
          .replace(/`([^`]*)`/g, `<span class="sql-ident">\`$1\`</span>`)
          .replace(/(--[^\n]*)/g, `<span class="sql-comment">$1</span>`)
          .replace(/\b(\d+)\b/g, `<span class="sql-num">$1</span>`)
          .replace(new RegExp(`\\b(${FN})(?=\\s*\\()`, "g"), `<span class="sql-fn">$1</span>`)
          .replace(new RegExp(`\\b(${KW})\\b`, "g"), `<span class="sql-kw">$1</span>`);
      }

      // ── Copy-SQL handler (called via onclick on code blocks) ────────────
      function copySQL(btn) {
        const raw = btn.closest(".wt-code-block").querySelector("[data-raw]").dataset.raw;
        navigator.clipboard.writeText(raw).then(() => {
          btn.textContent = t("copied");
          btn.classList.add("copied");
          setTimeout(() => { btn.textContent = t("copy"); btn.classList.remove("copied"); }, 1800);
        }).catch(() => { btn.textContent = "Error"; setTimeout(() => btn.textContent = t("copy"), 1500); });
      }

      // ── Walkthrough renderer (SQL project only) ─────────────────────────
      function renderWalkthrough(wt) {
        if (!wt) return "";
        const intro = wt.intro || {};
        const steps = wt.steps || [];
        const outro = wt.outro || {};

        function stepColor(iconUrl) {
          const m = (iconUrl || "").match(/color=%23([0-9a-fA-F]{6})/);
          return m ? "#" + m[1] : "#00d4ff";
        }
        function hexRGB(hex) {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return `${r},${g},${b}`;
        }

        const stepsHtml = steps.map(step => {
          const color = stepColor(step.iconUrl);
          const rgb   = hexRGB(color);
          const tagStyle = `color:${color};background:rgba(${rgb},0.13);border-color:rgba(${rgb},0.32)`;
          const barStyle = `background:${color}`;
          return `
            <div class="wt-step">
              <div class="wt-step-bar" style="${barStyle}"></div>
              <div class="wt-step-content">
                <div class="wt-step-header">
                  <div class="wt-step-left">
                    <span class="wt-step-num">${esc(step.num || "")}</span>
                    <span class="wt-step-tag" style="${tagStyle}">${esc(step.tag || "")}</span>
                    <h3 class="wt-step-title">${esc(step.title || "")}</h3>
                  </div>
                  ${step.iconUrl ? `<div class="wt-step-icon"><img src="${esc(step.iconUrl)}" alt="${esc(step.title || "")}" loading="lazy" onerror="this.style.display='none'"></div>` : ""}
                </div>
                <p class="wt-step-desc">${esc(step.desc || "")}</p>
                ${step.code ? `
                <div class="wt-code-block">
                  <div class="wt-code-header">
                    <div class="wt-code-header-left">
                      <div class="wt-code-circles"><span></span><span></span><span></span></div>
                      <span class="wt-code-label">${esc(step.codeLabel || "SQL")}</span>
                    </div>
                    <button class="wt-code-copy" onclick="copySQL(this)" aria-label="Copy code">${t("copy")}</button>
                  </div>
                  <div class="wt-code-body">
                    <code class="wt-code" data-raw="${step.code.replace(/"/g, "&quot;")}">${highlightSQL(step.code)}</code>
                  </div>
                </div>` : ""}
              </div>
            </div>`;
        }).join("");

        return `
          <div class="proj-section">
            <h2 class="proj-section-title">${t("walkthroughTitle")}</h2>

            <div class="wt-intro">
              <div class="wt-intro-flow">
                ${intro.mysqlIconUrl ? `<div class="wt-flow-step"><img src="${esc(intro.mysqlIconUrl)}" alt="MySQL"><span>MySQL</span></div>` : ""}
                ${intro.mysqlIconUrl ? `<div class="wt-flow-arrow">→</div>` : ""}
                ${intro.dbIconUrl    ? `<div class="wt-flow-step"><img src="${esc(intro.dbIconUrl)}" alt="Raw data"><span>${t("rawData")}</span></div>` : ""}
                ${intro.dbIconUrl    ? `<div class="wt-flow-arrow">→</div>` : ""}
                ${intro.cleanIconUrl ? `<div class="wt-flow-step"><img src="${esc(intro.cleanIconUrl)}" alt="Clean data"><span>${t("cleanData")}</span></div>` : ""}
              </div>
              <p class="wt-intro-sub">${esc(intro.subtitle || "")}</p>
            </div>

            <div class="wt-steps">${stepsHtml}</div>

            <div class="wt-outro">
              <div class="wt-outro-badge">✓</div>
              <div>
                <h3 class="wt-outro-title">${esc(outro.title || "")}</h3>
                <p class="wt-outro-desc">${esc(outro.desc || "")}</p>
              </div>
            </div>
          </div>`;
      }

      // ── Report insights renderer (Mexico Toys case-study) ──────────────
      function renderReportInsights(r) {
        if (!r) return "";
        const kpis = r.kpis || [];
        const insights = r.insights || [];
        const rc = r.rootCause || {};
        const recs = r.recommendations || [];
        const bottom = r.bottomLine || [];

        /* Priority as an aurora heat scale (hot → cool). Red stays reserved
           for the root-cause alarm banner so it keeps its urgency. */
        const priorityColor = (p) =>
          p === "HIGH"
            ? ["var(--magenta)", "var(--magenta-rgb)"]
            : p === "MEDIUM"
              ? ["var(--violet)", "var(--violet-rgb)"]
              : ["var(--blue)", "var(--blue-rgb)"];
        const hexRGB = (hex) => {
          const h = hex.replace("#", "");
          return `${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)}`;
        };
        const maxDrop = Math.max(...(rc.categoryDrops || [{pct:1}]).map(c => c.pct));

        const kpiHtml = kpis.map(k => `
          <div class="report-kpi">

        const insightsHtml = insights.map(it => {

                <h4 class="ri-title">${esc(it.title)}</h4>

              <p class="ri-text">${esc(it.text)}</p>

        const barsHtml = (rc.categoryDrops || []).map(c => {

          return `
            <div class="rc-bar-row">

              <span class="rc-bar-pct">−${c.pct}%</span>

        const recsHtml = recs.map(rec => {

        }).join("");

        const bottomHtml = bottom.map((b, i) => `
          <div class="bl-item">
            <span class="bl-num">${i + 1}</span>

        return `
          <div class="proj-section report-section">
            <h2 class="proj-section-title">${t("reportTitle")}</h2>
            ${r.metaLine ? `<p class="report-meta">${esc(r.metaLine)}</p>` : ""}

            <div class="report-kpis">${kpiHtml}</div>

            <h3 class="report-subhead">${t("keyInsights")}</h3>

            <h3 class="report-subhead">${t("rootCauseTitle")}</h3>

              <div class="rc-banner">

            <div class="report-recs">${recsHtml}</div>

            <div class="report-bottomline">
              <div class="bl-head">${t("bottomLineTitle")}</div>
              ${bottomHtml}
            </div>
          </div>`;
      }

      // ── Carousel initialiser (reused on main view and project pages) ──────
      function initCarousels(scope) {
        const root = scope || document;
        root.querySelectorAll("[data-carousel]").forEach((carousel) => {
          const slides = carousel.querySelectorAll(".carousel-slide");
          const dotsWrap = carousel.querySelector(".carousel-dots");
          const prev = carousel.querySelector("[data-prev]");
          const next = carousel.querySelector("[data-next]");
          if (!slides.length || !dotsWrap || !prev || !next) return;
          // clear any previously created dots (important when re-initialising)
          dotsWrap.innerHTML = "";
          let idx = 0;
          let timer = null;
          slides.forEach((_, i) => {
            const b = document.createElement("button");
            b.className = "dot-btn" + (i === 0 ? " active" : "");
            b.addEventListener("click", () => go(i, true));
            dotsWrap.appendChild(b);
          });
          const dots = dotsWrap.querySelectorAll(".dot-btn");
          const go = (i, manual) => {
            idx = (i + slides.length) % slides.length;
            slides.forEach((s, k) => s.classList.toggle("active", k === idx));
            dots.forEach((d, k) => d.classList.toggle("active", k === idx));
            if (manual) restart();
          };
          prev.addEventListener("click", () => go(idx - 1, true));
          next.addEventListener("click", () => go(idx + 1, true));
          const start = () => { timer = setInterval(() => go(idx + 1), 5500); };
          const restart = () => { clearInterval(timer); start(); };
          carousel.addEventListener("mouseenter", () => clearInterval(timer));
          carousel.addEventListener("mouseleave", start);
          const visObs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) start();
                else clearInterval(timer);
              });
            },
            { threshold: 0.3 },
          );
          visObs.observe(carousel);
        });
      }

      // ── SPA routing — project detail pages ──────────────────────────────
      let _portfolioData = null; // set in bootstrap, used by router

      function router() {
        const hash = window.location.hash;
        const match = hash.match(/^#\/project\/([a-z0-9-]+)$/);
        const src = currentData();
        if (match && src) {
          const id = match[1];
          const project = (src.projects.items || []).find(
            (p) => p.id === id,
          );
          if (project) { showProjectPage(project); return; }
        }
        showMainView();
      }

        document.querySelector("main").style.display = "none";
        document.getElementById("footer").style.display = "none";

        if (mobileNav) mobileNav.style.display = "none";
        const el = document.getElementById("projectPage");
        el.style.display = "block";
        renderProjectPage(project);
        window.scrollTo({ top: 0, behavior: "instant" });
      }

      function showMainView() {
        document.querySelector("main").style.display = "";
        document.getElementById("footer").style.display = "";
        const mobileNav = document.getElementById("mobileNav");
        if (mobileNav) mobileNav.style.display = "";
        document.getElementById("projectPage").style.display = "none";
